<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beata's Recipe Box</title>
<style>
  :root {
    --bg: #fbf9ff;
    --card: #ffffff;
    --ink: #2b2440;
    --muted: #7a7292;
    --purple: #8b5cf6;
    --pink: #ec4899;
    --teal: #14b8a6;
    --accent: #8b5cf6;
    --accent-soft: #f1e9ff;
    --border: #e9e3f5;
    --gradient: linear-gradient(120deg, var(--purple), var(--pink), var(--teal));

    /* tag category colors: meal type / protein / method / other */
    --meal-bg: #f1e9ff;   --meal-text: #6d28d9;   --meal-solid: #8b5cf6;
    --protein-bg: #fde7f3; --protein-text: #be185d; --protein-solid: #ec4899;
    --method-bg: #e3f9f6; --method-text: #0f766e;  --method-solid: #14b8a6;
    --other-bg: #eef0f4;  --other-text: #55596b;   --other-solid: #55596b;
    --sunset-soft: linear-gradient(120deg, #fef3e2, #fde3d3, #fbdbe0);
    --sunset-text: #9a3412;
    --sunset-solid: linear-gradient(120deg, #fbbf24, #f97316, #ef4444);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    position: relative;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(40% 40% at 15% 20%, rgba(139,92,246,0.14), transparent 70%),
      radial-gradient(35% 35% at 85% 15%, rgba(236,72,153,0.12), transparent 70%),
      radial-gradient(45% 45% at 50% 95%, rgba(20,184,166,0.11), transparent 70%);
    filter: blur(60px);
    z-index: -1;
    pointer-events: none;
  }
  header {
    padding: 28px 24px 18px;
    max-width: 1000px;
    margin: 0 auto;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 28px;
  }
  .grad-text {
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
  }
  .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 18px;
    min-height: 18px;
    transition: opacity .4s ease;
  }
  .controls {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .search-row {
    display: flex;
    gap: 10px;
  }
  #search {
    flex: 1;
    width: 100%;
    padding: 12px 16px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--ink);
  }
  .add-recipe-btn {
    flex-shrink: 0;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    background: var(--gradient);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(139,92,246,0.25);
  }
  @media (max-width: 640px) {
    .search-row { flex-wrap: wrap; }
    .search-row input { flex-basis: 100%; }
  }
  .export-footer {
    max-width: 1000px;
    margin: 0 auto 50px;
    padding: 24px 24px 0;
    text-align: center;
  }
  .export-btn {
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    color: var(--other-text);
    background: var(--other-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
  }
  .export-btn:hover { background: var(--other-solid); color: #fff; }
  .export-footer .fetch-status { margin-top: 8px; }
  #search:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.15), 0 0 0 6px rgba(20,184,166,0.08);
  }
  .tag-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag-chip {
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    user-select: none;
  }
  .tag-chip.cat-meal    { background: var(--meal-bg);    color: var(--meal-text);    border-color: transparent; }
  .tag-chip.cat-protein { background: var(--protein-bg); color: var(--protein-text); border-color: transparent; }
  .tag-chip.cat-method  { background: var(--method-bg);  color: var(--method-text);  border-color: transparent; }
  .tag-chip.cat-other   { background: var(--other-bg);   color: var(--other-text);   border-color: transparent; }

  .tag-chip.cat-meal.active    { background: var(--meal-solid);    color: #fff; box-shadow: 0 2px 8px rgba(139,92,246,0.25); }
  .tag-chip.cat-protein.active { background: var(--protein-solid); color: #fff; box-shadow: 0 2px 8px rgba(236,72,153,0.25); }
  .tag-chip.cat-method.active  { background: var(--method-solid);  color: #fff; box-shadow: 0 2px 8px rgba(20,184,166,0.25); }
  .tag-chip.cat-other.active   { background: var(--other-solid);   color: #fff; box-shadow: 0 2px 8px rgba(85,89,107,0.25); }
  .tag-chip.cat-vibe    { background: var(--sunset-soft); color: var(--sunset-text); border-color: transparent; }
  .tag-chip.cat-vibe.active { background: var(--sunset-solid); color: #fff; box-shadow: 0 2px 8px rgba(249,115,22,0.3); }
  #count {
    max-width: 1000px;
    margin: 14px auto 0;
    padding: 0 24px;
    font-size: 13px;
    color: var(--muted);
  }
  .grid {
    max-width: 1000px;
    margin: 12px auto 60px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: box-shadow .15s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    box-shadow: 0 8px 20px rgba(139,92,246,0.12), 0 3px 8px rgba(236,72,153,0.08);
    transform: translateY(-2px);
  }
  .card-img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
  }
  .card-body {
    position: relative;
    padding: 20px 18px 16px;
  }
  .card-body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--gradient);
  }
  .card h3 {
    margin: 0 0 6px;
    font-size: 17px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0 10px;
  }
  .tag-pill {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: .2px;
  }
  .tag-pill.cat-meal    { background: var(--meal-bg);    color: var(--meal-text); }
  .tag-pill.cat-protein { background: var(--protein-bg); color: var(--protein-text); }
  .tag-pill.cat-method  { background: var(--method-bg);  color: var(--method-text); }
  .tag-pill.cat-other   { background: var(--other-bg);   color: var(--other-text); }
  .tag-pill.cat-vibe    { background: var(--sunset-soft); color: var(--sunset-text); }
  .empty {
    max-width: 1000px;
    margin: 60px auto;
    text-align: center;
    color: var(--muted);
    padding: 0 24px;
  }
  /* modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 16px;
    max-width: 560px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 26px 28px;
    position: relative;
  }
  .modal h2 { margin-top: 0; }
  .modal-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 16px;
    display: block;
  }
  .modal .close-btn {
    position: absolute;
    top: 16px;
    right: 18px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    transition: color .15s;
  }
  .modal .close-btn:hover {
    color: var(--pink);
  }
  .modal-section {
    margin-top: 16px;
  }
  .modal-section h4 {
    margin: 0 0 8px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .5px;
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
  }
  .modal-section ul, .modal-section ol {
    margin: 0;
    padding-left: 20px;
  }
  .modal-section li { margin-bottom: 4px; }
  .macro-disclaimer {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 6px;
  }
  .macro-source-ref {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .tag-remove {
    border: none;
    background: none;
    color: inherit;
    opacity: 0.6;
    cursor: pointer;
    font-size: 12px;
    margin-left: 4px;
    padding: 0;
    line-height: 1;
  }
  .tag-remove:hover { opacity: 1; }
  .add-tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0 6px;
  }
  .add-tag-row select,
  .add-tag-row input[type="text"] {
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--ink);
    font-family: inherit;
  }
  .add-tag-row input[type="text"] { flex: 1; min-width: 120px; }
  .add-tag-row button {
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border: none;
    border-radius: 8px;
    background: var(--gradient);
    color: #fff;
    cursor: pointer;
  }
  .delete-recipe-btn {
    font-size: 13px;
    font-weight: 600;
    color: #b91c1c;
    background: #fef2f2;
    border: 1px solid #fecaca;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  .delete-recipe-btn:hover { background: #fee2e2; }
  .form-field { margin-bottom: 14px; }
  .form-field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-field input[type="text"],
  .form-field input[type="url"],
  .form-field textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--ink);
    font-family: inherit;
  }
  .form-field textarea { min-height: 90px; resize: vertical; }
  .form-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .fetch-row { display: flex; gap: 8px; }
  .fetch-row input { flex: 1; }
  .fetch-row button, .form-actions button {
    font-size: 13px;
    font-weight: 700;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: var(--gradient);
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
  }
  .form-actions { display: flex; gap: 10px; margin-top: 18px; }
  .form-actions .cancel-btn { background: var(--other-bg); color: var(--other-text); }
  .macro-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .macro-grid input { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; }
  .checkbox-groups { display: flex; flex-direction: column; gap: 12px; }
  .checkbox-group-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .checkbox-options { display: flex; flex-wrap: wrap; gap: 8px; }
  .checkbox-options label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--other-bg);
    color: var(--other-text);
    cursor: pointer;
  }
  .checkbox-options input { margin: 0; }
  .fetch-status { font-size: 12px; margin-top: 6px; color: var(--muted); }
  .source-link {
    font-size: 13px;
    color: var(--purple);
    font-weight: 600;
    text-decoration: none;
  }
  .source-link:hover { text-decoration: underline; }
  .tag-summary {
    max-width: 1000px;
    margin: 20px auto 60px;
    padding: 24px 24px 0;
    border-top: 1px solid var(--border);
  }
  .tag-summary h3 {
    margin: 0 0 14px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    font-weight: 700;
  }
  .tag-summary-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .summary-pill {
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .tag-summary-empty {
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>🍲 <span class="grad-text">Beata's Recipe Box</span></h1>
  <div class="sub" id="tagline"></div>
</header>

<div class="controls">
  <div class="search-row">
    <input id="search" type="text" placeholder="Search by name, ingredient, or tag…">
    <button type="button" class="add-recipe-btn" id="openAddFormBtn">+ Add Recipe</button>
  </div>
  <div class="tag-bar" id="tagBar"></div>
</div>

<div id="count"></div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<div class="overlay" id="formOverlay">
  <div class="modal" id="formModal"></div>
</div>

<div class="tag-summary">
  <h3>Tag counts</h3>
  <div class="tag-summary-list" id="tagSummary"></div>
</div>

<div class="export-footer">
  <button type="button" class="export-btn" id="exportFileBtn" title="Bake everything added on this page into a fresh file to re-upload">⬇ Export Updated File</button>
  <div class="fetch-status" id="exportStatus"></div>
</div>

<script>
// ----------------------------------------------------------------------
// RECIPE DATA
// Add new recipes here as objects in this array. Each recipe:
// {
//   title: "Name of dish",
//   tags: ["dinner", "chicken", "quick"],   // auto-extracted against the taxonomy below

//   image: "images/dish-name.jpg"  (optional — path to a photo sitting next to this

//     Leave "" if there's no photo for this recipe.)

//   macros: { calories: "1200 kcal", protein: "60g", carbs: "90g", fat: "40g" },

//     // original source claimed. The real "Macros" shown to the user is
//     // now always calculated automatically from the ingredients list

//     // fill this in by hand. Omit "macros" entirely if you don't have it.

// }
//
// Import notes (for whoever's adding recipes):
// - Tags are pulled automatically from the recipe content against TAG_CATEGORIES
//   below, not typed in manually.
// - Macros are pulled automatically from the ingredients list, not typed in
//   manually either — just make sure ingredient lines have real quantities.
// - Screenshots named the same with a/b/c suffixes (e.g. pasta-a.png, pasta-b.png)
//   are the same recipe split across multiple images — combine into ONE entry.
// ----------------------------------------------------------------------

// Give every seed recipe a stable id derived from its title, so recipes
// added/edited later (tag changes, deletions, new recipes) can be tracked
// in the browser without touching this file.
function slugify(str) {
  return String(str).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}
SEED_RECIPES.forEach(r => { if (!r.id) r.id = slugify(r.title); });

// ------------------------------------------------------------------
// LOCAL STORAGE LAYER
// Recipes you add or edit right on the page (via "+ Add Recipe", the
// tag editor, or the delete button) are saved in this browser's
// localStorage — they DON'T change this HTML file itself. That means:
//   - They show up every time you reopen this page in the SAME browser.
//   - They will NOT show up on a different phone/laptop/browser until
//     you re-export this file (see the "Export updated file" button)
//     and either re-upload it to GitHub, or send it back for a proper
//     merge into the permanent recipe list.
// ------------------------------------------------------------------
const LS_KEYS = {
  userRecipes: "recipeBox_userRecipes",
  deletedIds: "recipeBox_deletedIds",
  tagOverrides: "recipeBox_tagOverrides"
};
function lsGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

let userRecipes = lsGet(LS_KEYS.userRecipes, []);
let deletedIds = lsGet(LS_KEYS.deletedIds, []);
let tagOverrides = lsGet(LS_KEYS.tagOverrides, {});

function getAllRecipes() {
  return [...SEED_RECIPES, ...userRecipes]
    .filter(r => !deletedIds.includes(r.id))
    .map(r => tagOverrides[r.id] ? { ...r, tags: tagOverrides[r.id] } : r);
}

function addUserRecipe(recipe) {
  recipe.id = "user-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7);
  userRecipes.push(recipe);
  lsSet(LS_KEYS.userRecipes, userRecipes);
  return recipe.id;
}

function deleteRecipeById(id) {
  if (id.startsWith("user-")) {
    userRecipes = userRecipes.filter(r => r.id !== id);
    lsSet(LS_KEYS.userRecipes, userRecipes);
  } else {
    if (!deletedIds.includes(id)) deletedIds.push(id);
    lsSet(LS_KEYS.deletedIds, deletedIds);
  }
}

function setRecipeTags(id, newTags) {
  if (id.startsWith("user-")) {
    const r = userRecipes.find(x => x.id === id);
    if (r) { r.tags = newTags; lsSet(LS_KEYS.userRecipes, userRecipes); }
  } else {
    tagOverrides[id] = newTags;
    lsSet(LS_KEYS.tagOverrides, tagOverrides);
  }
}

const TAG_CATEGORIES = {
  meal:    ["breakfast", "lunch", "dinner", "snack", "dessert", "drink", "bread", "lunchbox"],
  protein: ["vegetarian", "chicken", "beef", "fish", "pork", "turkey"],

  vibe:    ["quick", "family-recipe", "tried+liked", "socials-to-try", "summer", "winter", "indulgent", "healthy", "high-protein"]
};
function tagCategory(tag) {
  const t = String(tag).toLowerCase();
  for (const cat in TAG_CATEGORIES) {
    if (TAG_CATEGORIES[cat].includes(t)) return cat;
  }
  return "other";
}
function tagPillHtml(tag) {
  return `<span class="tag-pill cat-${tagCategory(tag)}">${escapeHtml(tag)}</span>`;
}

  tok = tok.replace(/~/g, "").trim();
  if (!tok) return null;
  const range = tok.match(/^(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)$/);
  if (range) return (parseFloat(range[1]) + parseFloat(range[2])) / 2;
  const num = parseFloat(tok);
  return isNaN(num) ? null : num;
}

function preNormalizeQty(text) {
  let t = text;
  const fracMap = { "½":0.5, "¼":0.25, "¾":0.75, "⅓":0.333, "⅔":0.667, "⅛":0.125 };
  t = t.replace(/(\d+)\s*([½¼¾⅓⅔⅛])/g, (m, whole, f) => (parseFloat(whole) + fracMap[f]).toString());
  t = t.replace(/([½¼¾⅓⅔⅛])/g, (m, f) => fracMap[f].toString());
  t = t.replace(/(\d+)\s+(\d+)\/(\d+)/g, (m, w, num, d) => (parseInt(w) + parseInt(num) / parseInt(d)).toString());
  t = t.replace(/(\d+)\/(\d+)/g, (m, num, d) => (parseInt(num) / parseInt(d)).toString());
  return t;
}

const UNIT_WORDS = "kg|g|grams?|kilograms?|ml|l|liters?|cups?|tbsp|tablespoons?|tsp|teaspoons?|oz|ounces?|lbs?|pounds?|cloves?|slices?|cans?|packets?|packs?|pieces?";

function splitCompoundLine(line) {
  let t = line;
  const labelMatch = t.match(/^([A-Za-z][A-Za-z \-]{0,30}):\s*/);
  if (labelMatch) t = t.slice(labelMatch[0].length);
  const startsWithDigit = /^[\d~½¼¾⅓⅔⅛]/.test(t.trim());
  if (!startsWithDigit && t.includes(",")) {
    return t.split(",").map(s => s.trim()).filter(Boolean);
  }
  return [t];
}

function normalizeUnit(u) {
  if (!u) return "";
  u = u.toLowerCase();
  if (/^gram/.test(u)) return "g";
  if (/^kilogram/.test(u)) return "kg";
  if (/^liter/.test(u)) return "l";
  if (/^cup/.test(u)) return "cup";
  if (/^tablespoon/.test(u)) return "tbsp";
  if (/^teaspoon/.test(u)) return "tsp";
  if (/^ounce/.test(u)) return "oz";
  if (/^pound/.test(u)) return "lb";
  if (/^clove/.test(u)) return "clove";
  if (/^slice/.test(u)) return "slice";
  if (/^can/.test(u)) return "can";
  if (/^packet|^pack/.test(u)) return "packet";
  if (/^piece/.test(u)) return "piece";
  return u.replace(/s$/, "");
}

function parseClause(clause) {
  const t = preNormalizeQty(clause);
  const stripped = t.replace(/\([^)]*\)/g, " ").replace(/\s+/g, " ").trim();
  const re = new RegExp("^([\\d.\\-–]+)?\\s*(?:(" + UNIT_WORDS + ")\\b)?\\s*(.*)$", "i");
  const m = stripped.match(re);
  const qty = m ? parseQtyToken(m[1]) : null;
  const unit = m ? normalizeUnit(m[2] || "") : "";
  let name = (m ? m[3] : stripped).replace(/^of\s+/, "").trim();
  return { qty, unit, name: name || stripped };
}

function calcClauseMacros(clause) {
  const { qty, unit, name } = parseClause(clause);
  const food = findFood(name) || findFood(clause);
  if (!food) return { matched: false, macros: [0,0,0,0] };

  let grams;
  if (unit && food.overrides[unit] != null) {
    grams = (qty != null ? qty : 1) * food.overrides[unit];
  } else if (unit && GENERIC_UNIT_GRAMS[unit] != null) {
    grams = (qty != null ? qty : 1) * GENERIC_UNIT_GRAMS[unit];
  } else if (!unit && food.overrides.piece != null) {
    grams = (qty != null ? qty : 1) * food.overrides.piece;
  } else if (!unit && food.overrides.clove != null) {
    grams = (qty != null ? qty : 1) * food.overrides.clove;
  } else if (!unit && qty != null) {
    grams = qty;
  } else if (!unit && qty == null) {
    grams = food.per100.every(v => v === 0) ? 0 : 2;
  } else {
    grams = 0;
  }
  const factor = grams / 100;
  return { matched: true, macros: food.per100.map(v => v * factor) };
}

function calculateRecipeMacros(ingredients) {
  let totals = [0, 0, 0, 0];
  let matchedCount = 0, totalClauses = 0;
  (ingredients || []).forEach(line => {
    splitCompoundLine(line).forEach(clause => {
      totalClauses++;
      const r = calcClauseMacros(clause);
      if (r.matched) {
        matchedCount++;
        for (let i = 0; i < 4; i++) totals[i] += r.macros[i];
      }
    });
  });
  return {
    calories: Math.round(totals[0]),
    protein: Math.round(totals[1] * 10) / 10,
    carbs: Math.round(totals[2] * 10) / 10,
    fat: Math.round(totals[3] * 10) / 10,
    coverage: totalClauses ? Math.round(100 * matchedCount / totalClauses) : 0
  };
}

// ------------------------------------------------------------------
// METRIC CONVERTER
// Appends metric equivalents next to any US/imperial units it finds
// in ingredients or steps — °F, lb/oz, cups, quarts, and inch pan
// sizes — so nothing needs to be rewritten by hand. Runs at display
// time for every recipe, old and new. Skips temperatures that
// already show both units (some recipes already list "200°C/400°F").
// Cup conversions go to mL (an exact volume conversion) rather than
// guessing a gram weight, since that varies by ingredient.
// ------------------------------------------------------------------
const METRIC_QTY_RE = "(\\d+-\\d+\\/\\d+|\\d+\\s+\\d+\\/\\d+|\\d+\\/\\d+|\\d+(?:\\.\\d+)?\\s*[-–]\\s*\\d+(?:\\.\\d+)?|\\d+(?:\\.\\d+)?|[½¼¾⅓⅔⅛])";

function metricQtyToNumber(str) {
  const fracMap = { "½":0.5, "¼":0.25, "¾":0.75, "⅓":1/3, "⅔":2/3, "⅛":0.125 };
  if (fracMap[str] !== undefined) return fracMap[str];
  const hyphenMixed = str.match(/^(\d+)-(\d+)\/(\d+)$/);
  if (hyphenMixed) return parseInt(hyphenMixed[1]) + parseInt(hyphenMixed[2]) / parseInt(hyphenMixed[3]);
  const spaceMixed = str.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (spaceMixed) return parseInt(spaceMixed[1]) + parseInt(spaceMixed[2]) / parseInt(spaceMixed[3]);
  const frac = str.match(/^(\d+)\/(\d+)$/);
  if (frac) return parseInt(frac[1]) / parseInt(frac[2]);
  const range = str.match(/^(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)$/);
  if (range) return (parseFloat(range[1]) + parseFloat(range[2])) / 2;
  const n = parseFloat(str);
  return isNaN(n) ? null : n;
}

// ---- Double-check safety net ----
// Every metric conversion below is computed via TWO independent formulas
// (e.g. lb->g directly, and separately via lb->oz->g) and that agreement
// is re-checked twice before the number is trusted. If the two methods
// don't agree (which would catch a typo'd constant or a logic bug), the
// conversion is silently skipped rather than showing a possibly-wrong
// number — original text is left untouched in that case.
function withinTolerance(a, b, relTol, absTol) {
  return Math.abs(a - b) <= Math.max(absTol, relTol * Math.max(Math.abs(a), Math.abs(b)));
}
function doubleCheckedConversion(methodA, methodB, relTol, absTol) {
  for (let pass = 0; pass < 2; pass++) {
    const a = methodA();
    const b = methodB();
    if (a == null || b == null || isNaN(a) || isNaN(b) || !withinTolerance(a, b, relTol, absTol)) {
      return null;
    }
  }
  return methodA();
}

function convertTemps(text) {
  if (/°C|\bC\)/.test(text)) return text;
  return text.replace(/(\d+)\s*°?\s*F\b/g, (m, f) => {
    const fNum = parseFloat(f);
    // Method A: standard formula. Method B: equivalent but written differently
    // (division by 1.8 instead of *5/9) so a typo in one path won't silently agree.
    const verified = doubleCheckedConversion(
      () => (fNum - 32) * 5 / 9,
      () => (fNum - 32) / 1.8,
      0.001, 0.05
    );
    if (verified == null) return m;
    const c = Math.round(verified / 5) * 5;
    return `${m} (${c}°C)`;
  });
}
function convertPounds(text) {
  const re = new RegExp(METRIC_QTY_RE + "\\s*(lbs?|pounds?)\\b", "gi");
  return text.replace(re, (m, q) => {
    const n = metricQtyToNumber(q);
    if (n == null) return m;
    // Method A: lb->g direct constant. Method B: lb->oz->g via a separate constant.
    const grams = doubleCheckedConversion(
      () => n * 453.592,
      () => n * 16 * 28.3495,
      0.01, 0.5
    );
    if (grams == null) return m;
    const disp = grams >= 1000 ? (Math.round(grams / 10) / 100) + " kg" : Math.round(grams) + " g";
    return `${m} (~${disp})`;
  });
}
function convertOunces(text) {
  const re = new RegExp(METRIC_QTY_RE + "\\s*(oz|ounces?)\\b", "gi");
  return text.replace(re, (m, q) => {
    const n = metricQtyToNumber(q);
    if (n == null) return m;
    // Method A: oz->g direct constant. Method B: oz->lb->g via a separate constant.
    const grams = doubleCheckedConversion(
      () => n * 28.3495,
      () => (n / 16) * 453.592,
      0.01, 0.5
    );
    if (grams == null) return m;
    return `${m} (~${Math.round(grams)} g)`;
  });
}
function convertCups(text) {
  const re = new RegExp(METRIC_QTY_RE + "\\s*cups?\\b", "gi");
  return text.replace(re, (m, q) => {
    const n = metricQtyToNumber(q);
    if (n == null) return m;
    // Method A: kitchen-rounded 240 mL/cup (the friendlier convention we display).
    // Method B: the precise US legal cup (236.588 mL) — generous tolerance since A
    // is an intentional rounding of B, not a competing formula; still catches a
    // gross typo (e.g. an accidental extra digit) instantly.
    const ml = doubleCheckedConversion(
      () => n * 240,
      () => n * 236.588,
      0.02, 1
    );
    if (ml == null) return m;
    return `${m} (~${Math.round(n * 240)} mL)`;
  });
}
function convertQuarts(text) {
  const re = new RegExp(METRIC_QTY_RE + "-?\\s*quarts?\\b", "gi");
  return text.replace(re, (m, q) => {
    const n = metricQtyToNumber(q);
    if (n == null) return m;
    // Method A: quart->L direct constant. Method B: quart->cups->L via a separate constant.
    const liters = doubleCheckedConversion(
      () => n * 0.946353,
      () => n * 4 * 0.236588,
      0.01, 0.02
    );
    if (liters == null) return m;
    return `${m} (~${Math.round(liters * 10) / 10} L)`;
  });
}
function convertInches(text) {
  return text.replace(
    /(\d+(?:\.\d+)?)\s*x\s*(\d+(?:\.\d+)?)([\s-]*in(?:ch(?:es)?)?\.?)|(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)\s*in(?:ch(?:es)?)?\.?|(\d+(?:\.\d+)?)[\s-]*in(?:ch(?:es)?)?\.?/gi,
    (m, xa, xb, xsuffix, ra, rb, single) => {
      // Method A: *2.54 direct. Method B: *25.4/10 (mm-first route) — same exact
      // constant expressed a different way, so a typo in either still gets caught.
      const inToCm = (val) => doubleCheckedConversion(
        () => val * 2.54,
        () => (val * 25.4) / 10,
        0.001, 0.01
      );
      if (xa != null && xb != null) {
        const ca = inToCm(parseFloat(xa)), cb = inToCm(parseFloat(xb));
        if (ca == null || cb == null) return m;
        return `${m} (${Math.round(ca)}x${Math.round(cb)} cm)`;
      }
      if (ra != null && rb != null) {
        const ca = inToCm(parseFloat(ra)), cb = inToCm(parseFloat(rb));
        if (ca == null || cb == null) return m;
        return `${m} (${Math.round(ca)}–${Math.round(cb)} cm)`;
      }
      if (single != null) {
        const cs = inToCm(parseFloat(single));
        if (cs == null) return m;
        return `${m} (${Math.round(cs)} cm)`;
      }
      return m;
    }
  );
}
function metricify(text) {
  if (!text) return text;
  let t = convertTemps(text);
  t = convertPounds(t);
  t = convertOunces(t);
  t = convertCups(t);
  t = convertQuarts(t);
  t = convertInches(t);
  return t;
}

function macrosHtml(r) {
  const ingredients = r.ingredients || [];
  if (ingredients.length === 0) return "";
  const est = calculateRecipeMacros(ingredients);
  const rows = `
    <li>Calories: ${est.calories} kcal</li>
    <li>Protein: ${est.protein} g</li>
    <li>Carbs: ${est.carbs} g</li>
    <li>Fat: ${est.fat} g</li>
  `;
  const sourceRef = r.macros ? `<div class="macro-source-ref">Source page states: ${
    ["calories","protein","carbs","fat"].filter(k => r.macros[k]).map(k => `${k} ${escapeHtml(r.macros[k])}`).join(", ")
  }</div>` : "";
  return `<div class="modal-section">
    <h4>Estimated Macros (whole batch)</h4>
    <ul>${rows}</ul>
    <div class="macro-disclaimer">Auto-calculated from the ingredient list (${est.coverage}% of ingredients matched to a nutrition estimate) — treat as approximate, not lab-verified.</div>
    ${sourceRef}
  </div>`;
}

// Rotating taglines — inviting you to cook, not describing the app.
const TAGLINES = [
  "Whisk happens. Let's cook anyway.",
  "Stop scrolling. Start sautéing.",
  "Your camera roll called — it wants to become dinner.",
  "Lettuce turnip the beet and get cooking.",
  "In this kitchen, we thyme travel from 'saved' to 'served.'",
  "You had me at 'preheat oven to 375°F.'",
  "Feed yourself, Seymour. Pick something already.",
  "Cooking: because your takeout app is getting suspicious.",
  "Reduce screen time. Increase simmer time.",
  "This is your sign to actually make the pasta.",
  "Grate minds cook alike.",
  "Some people dream in color. You dream in recipe reels. Let's fix that."
];
function pickTagline(exclude) {
  let choice;
  do {
    choice = TAGLINES[Math.floor(Math.random() * TAGLINES.length)];
  } while (choice === exclude && TAGLINES.length > 1);
  return choice;
}
function startTaglineRotation() {
  const el = document.getElementById("tagline");
  let current = pickTagline();
  el.textContent = current;
  setInterval(() => {
    el.style.opacity = 0;
    setTimeout(() => {
      current = pickTagline(current);
      el.textContent = current;
      el.style.opacity = 1;
    }, 400);
  }, 6000);
}

let activeTags = new Set(); // multiple tags can be active at once
let searchTerm = "";

function allTags() {
  const set = new Set();
  getAllRecipes().forEach(r => r.tags.forEach(t => set.add(t)));
  return Array.from(set).sort();
}

function renderTagBar() {
  const bar = document.getElementById("tagBar");
  bar.innerHTML = "";
  if (activeTags.size > 0) {
    const clear = document.createElement("div");
    clear.className = "tag-chip";
    clear.style.fontWeight = "700";
    clear.textContent = "✕ Clear filters";
    clear.onclick = () => {
      activeTags.clear();
      renderTagBar();
      renderGrid();
    };
    bar.appendChild(clear);
  }
  allTags().forEach(tag => {
    const chip = document.createElement("div");
    chip.className = "tag-chip cat-" + tagCategory(tag) + (activeTags.has(tag) ? " active" : "");
    chip.textContent = tag;
    chip.onclick = () => {
      if (activeTags.has(tag)) activeTags.delete(tag);
      else activeTags.add(tag);
      renderTagBar();
      renderGrid();
    };
    bar.appendChild(chip);
  });
}

function renderTagSummary() {
  const container = document.getElementById("tagSummary");
  const counts = {};
  getAllRecipes().forEach(r => (r.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
  const tags = Object.keys(counts).sort();

  if (tags.length === 0) {
    container.innerHTML = `<div class="tag-summary-empty">Tag counts will show up here once a few recipes are in.</div>`;
    return;
  }

  container.innerHTML = tags.map(t =>
    `<span class="tag-pill summary-pill cat-${tagCategory(t)}" data-tag="${escapeHtml(t)}">${escapeHtml(t)} · ${counts[t]}</span>`
  ).join("");

  container.querySelectorAll(".summary-pill").forEach(el => {
    el.addEventListener("click", () => {
      const tag = el.getAttribute("data-tag");
      if (activeTags.has(tag)) activeTags.delete(tag);
      else activeTags.add(tag);
      renderTagBar();
      renderGrid();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function matchesSearch(r, term) {
  if (!term) return true;
  const hay = [r.title, r.notes, ...(r.tags||[]), ...(r.ingredients||[])].join(" ").toLowerCase();
  return hay.includes(term.toLowerCase());
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count");
  grid.innerHTML = "";

  const all = getAllRecipes();

  if (all.length === 0) {
    countEl.textContent = "";
    grid.innerHTML = `<div class="empty">No recipes yet — send some screenshots over, paste a link, or hit "+ Add Recipe" above.</div>`;
    return;
  }

  const filtered = all.filter(r => {
    const tagOk = activeTags.size === 0 || Array.from(activeTags).every(t => r.tags.includes(t));
    return tagOk && matchesSearch(r, searchTerm);
  });

  countEl.textContent = `${filtered.length} recipe${filtered.length === 1 ? "" : "s"}`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">No recipes match. Try clearing the search or tag filter.</div>`;
    return;
  }

  filtered.forEach((r) => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openModal(r.id);
    card.innerHTML = `
      ${r.image ? `<img class="card-img" src="${escapeHtml(r.image)}" alt="${escapeHtml(r.title)}">` : ""}
      <div class="card-body">
        <h3>${escapeHtml(r.title)}</h3>
        <div class="card-tags">${r.tags.map(tagPillHtml).join("")}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function tagOptionGroupsHtml(currentTags) {
  const labels = { meal: "Meal type", protein: "Protein", method: "Method", vibe: "Vibe" };
  let html = "";
  for (const cat in TAG_CATEGORIES) {
    const opts = TAG_CATEGORIES[cat].filter(t => !currentTags.includes(t));
    if (opts.length === 0) continue;
    html += `<optgroup label="${labels[cat]}">` +
      opts.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("") +
      `</optgroup>`;
  }
  return html;
}

function openModal(id) {
  const r = getAllRecipes().find(x => x.id === id);
  if (!r) return;
  const modal = document.getElementById("modal");
  modal.innerHTML = `
    <button class="close-btn" onclick="closeModal()">✕</button>
    ${r.image ? `<img class="modal-img" src="${escapeHtml(r.image)}" alt="${escapeHtml(r.title)}">` : ""}
    <h2>${escapeHtml(r.title)}</h2>
    <div class="card-tags" id="modalTagList">
      ${r.tags.map(t => `<span class="tag-pill cat-${tagCategory(t)}">${escapeHtml(t)}<button class="tag-remove" data-tag="${escapeHtml(t)}" title="Remove tag">×</button></span>`).join("")}
    </div>
    <div class="add-tag-row">
      <select id="addTagSelect">
        <option value="">+ add a tag…</option>
        ${tagOptionGroupsHtml(r.tags)}
      </select>
      <input type="text" id="addTagCustom" placeholder="or type a custom tag">
      <button type="button" id="addTagBtn">Add</button>
    </div>
    <div class="modal-section">
      <h4>Ingredients</h4>
      <ul>${(r.ingredients||[]).map(i => `<li>${escapeHtml(metricify(i))}</li>`).join("")}</ul>
    </div>
    <div class="modal-section">
      <h4>Steps</h4>
      <ol>${(r.steps||[]).map(s => `<li>${escapeHtml(metricify(s))}</li>`).join("")}</ol>
    </div>
    ${macrosHtml(r)}
    ${r.notes ? `<div class="modal-section"><h4>Notes</h4><div>${escapeHtml(r.notes)}</div></div>` : ""}
    ${r.sourceLink ? `<div class="modal-section"><a class="source-link" href="${escapeHtml(r.sourceLink)}" target="_blank" rel="noopener">View original ↗</a></div>` : ""}
    <div class="modal-section">
      <button type="button" class="delete-recipe-btn" id="deleteRecipeBtn">Delete this recipe</button>
    </div>
  `;

  modal.querySelectorAll(".tag-remove").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const tag = btn.getAttribute("data-tag");
      const fresh = getAllRecipes().find(x => x.id === id);
      setRecipeTags(id, fresh.tags.filter(t => t !== tag));
      openModal(id);
      renderTagBar(); renderGrid(); renderTagSummary();
    });
  });

  document.getElementById("addTagBtn").addEventListener("click", () => {
    const select = document.getElementById("addTagSelect");
    const custom = document.getElementById("addTagCustom");
    const newTag = (custom.value.trim() || select.value || "").toLowerCase().trim();
    if (!newTag) return;
    const fresh = getAllRecipes().find(x => x.id === id);
    if (!fresh.tags.includes(newTag)) {
      setRecipeTags(id, [...fresh.tags, newTag]);
    }
    openModal(id);
    renderTagBar(); renderGrid(); renderTagSummary();
  });

  document.getElementById("deleteRecipeBtn").addEventListener("click", () => {
    if (confirm(`Delete "${r.title}"? This removes it from this browser's recipe box.`)) {
      deleteRecipeById(id);
      closeModal();
      renderTagBar(); renderGrid(); renderTagSummary();
    }
  });

  document.getElementById("overlay").classList.add("open");
}
function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}
document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") closeModal();
});

      <div class="fetch-row">
        <input type="url" id="fUrl" placeholder="https://example.com/recipe" value="${escapeHtml(prefill.sourceLink || "")}">
        <button type="button" id="fetchBtn">Try Auto-Fill</button>
      </div>
      <div class="fetch-status" id="fetchStatus"></div>
      <div class="form-hint">Works on sites that publish structured recipe data — not guaranteed everywhere. If it doesn't work, fill in the fields by hand, or send the link back in chat.</div>
    </div>
    <div class="form-field">
      <label>Title</label>
      <input type="text" id="fTitle" value="${escapeHtml(prefill.title || "")}">
    </div>
    <div class="form-field">
      <label>Image URL (optional)</label>
      <input type="text" id="fImage" value="${escapeHtml(prefill.image || "")}">
    </div>
    <div class="form-field">
      <label>Ingredients (one per line)</label>
      <textarea id="fIngredients">${escapeHtml((prefill.ingredients || []).join("\n"))}</textarea>
    </div>
    <div class="form-field">
      <label>Steps (one per line)</label>
      <textarea id="fSteps">${escapeHtml((prefill.steps || []).join("\n"))}</textarea>
    </div>
    <div class="form-hint" style="margin-bottom:14px;">Macros aren't entered by hand anymore — they're calculated automatically from whatever you put in the ingredients list above, once you save.</div>
    <div class="form-field">
      <label>Notes (optional)</label>
      <textarea id="fNotes" style="min-height:50px;">${escapeHtml(prefill.notes || "")}</textarea>
    </div>
    <div class="form-field">
      <label>Tags</label>
      <div class="checkbox-groups" id="fTagGroups">${checkboxGroupsHtml(prefill.tags || [])}</div>
      <input type="text" id="fCustomTags" placeholder="Custom tags, comma-separated" style="margin-top:10px;">
    </div>
    <div class="form-actions">
      <button type="button" id="saveRecipeBtn">Save Recipe</button>
      <button type="button" class="cancel-btn" onclick="closeAddForm()">Cancel</button>
    </div>
  `;

  document.getElementById("fetchBtn").addEventListener("click", async () => {
    const url = document.getElementById("fUrl").value.trim();
    const status = document.getElementById("fetchStatus");
    if (!url) { status.textContent = "Enter a URL first."; return; }
    status.textContent = "Fetching… this can take a few seconds.";
    const result = await tryFetchRecipe(url);
    if (result) {
      status.textContent = "Got it — review everything below before saving.";
      renderAddForm(result);
    } else {
      status.textContent = "Couldn't auto-fill from this page. Fill in the fields manually, or send the link back in chat.";
    }
  });

  document.getElementById("saveRecipeBtn").addEventListener("click", () => {
    const title = document.getElementById("fTitle").value.trim();
    if (!title) { alert("Give the recipe a title first."); return; }
    const checked = Array.from(document.querySelectorAll("#fTagGroups input:checked")).map(cb => cb.value);
    const custom = document.getElementById("fCustomTags").value.split(",").map(t => t.trim().toLowerCase()).filter(Boolean);
    const tags = Array.from(new Set([...checked, ...custom]));

    const recipe = {
      title,
      tags,
      source: "Added on page",
      sourceLink: document.getElementById("fUrl").value.trim(),
      image: document.getElementById("fImage").value.trim(),
      ingredients: document.getElementById("fIngredients").value.split("\n").map(s => s.trim()).filter(Boolean),
      steps: document.getElementById("fSteps").value.split("\n").map(s => s.trim()).filter(Boolean),
      notes: document.getElementById("fNotes").value.trim()
    };
    // If auto-fill pulled official macros from the source page, keep them
    // around as a reference note alongside the auto-calculated estimate.
    if (prefill.macros && Object.keys(prefill.macros).length > 0) recipe.macros = prefill.macros;

    addUserRecipe(recipe);
    closeAddForm();
    renderTagBar(); renderGrid(); renderTagSummary();
  });
}

function openAddForm() {
  renderAddForm();
  document.getElementById("formOverlay").classList.add("open");
}
function closeAddForm() {
  document.getElementById("formOverlay").classList.remove("open");
}
document.getElementById("formOverlay").addEventListener("click", (e) => {
  if (e.target.id === "formOverlay") closeAddForm();
});
document.getElementById("openAddFormBtn").addEventListener("click", openAddForm);

// ------------------------------------------------------------------
// URL AUTO-FILL ENGINE
// Tries several strategies, in order, since recipe sites vary a lot:
//   1. Fetch the page directly (works if the site allows cross-origin
//      requests — rare, but free when it happens).
//   2. Fall back through a few public CORS proxies.
//   3. Look for schema.org Recipe data (JSON-LD) — most recipe blogs
//      publish this, even ones with very different visual layouts.
//      Handles nested @graph/mainEntity wrappers, HowTo sections,
//      and HTML-flavored ingredient/instruction text.
//   4. If no JSON-LD Recipe is found, fall back to scanning for
//      common recipe-plugin markup (WP Recipe Maker, Tasty Recipes,
//      Mediavine Create, and generic microdata itemprops).
//   5. Fill any still-missing title/image from basic page meta tags.
// None of this is guaranteed — some sites block all of it. When it
// fails, fill the form in by hand, or send the link back in chat.
// ------------------------------------------------------------------
function stripHtml(str) {
  if (!str) return "";
  const div = document.createElement("div");
  div.innerHTML = String(str);
  return div.textContent.replace(/\s+/g, " ").trim();
}

async function fetchHtmlSomehow(url) {
  const attempts = [
    () => fetch(url),
    () => fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url)),
    () => fetch("https://corsproxy.io/?url=" + encodeURIComponent(url)),
    () => fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url)),
    () => fetch("https://r.jina.ai/" + url)
  ];
  for (const attempt of attempts) {
    try {
      const res = await attempt();
      if (!res || !res.ok) continue;
      const text = await res.text();
      if (text && text.length > 200) return text;
    } catch (e) { /* try the next approach */ }
  }
  return null;
}

function flattenInstructions(instr) {
  if (!instr) return [];
  if (typeof instr === "string") {
    const div = document.createElement("div");
    div.innerHTML = instr;
    const items = Array.from(div.querySelectorAll("li, p")).map(el => el.textContent.trim()).filter(Boolean);
    if (items.length > 0) return items;
    return stripHtml(instr).split(/\n+/).map(s => s.trim()).filter(Boolean);
  }
  if (Array.isArray(instr)) {
    let out = [];
    instr.forEach(item => {
      if (item == null) return;
      if (typeof item === "string") { out.push(stripHtml(item)); return; }
      if (item.itemListElement) { out = out.concat(flattenInstructions(item.itemListElement)); return; }
      out.push(stripHtml(item.text || item.name || ""));
    });
    return out.filter(Boolean);
  }
  return [];
}

function findRecipesInJsonLd(doc) {
  const found = [];
  function collect(node) {
    if (!node) return;
    if (Array.isArray(node)) { node.forEach(collect); return; }
    if (typeof node !== "object") return;
    const type = node["@type"];
    const isRecipe = type === "Recipe" || (Array.isArray(type) && type.includes("Recipe"));
    if (isRecipe) found.push(node);
    if (node["@graph"]) collect(node["@graph"]);
    if (node.mainEntity) collect(node.mainEntity);
    if (node.itemListElement) collect(node.itemListElement);
  }
  doc.querySelectorAll('script[type="application/ld+json"]').forEach(script => {
    try { collect(JSON.parse(script.textContent)); } catch (e) { /* skip malformed blocks */ }
  });
  // Prefer entries that actually list ingredients, in case a page has
  // more than one Recipe block (e.g. a roundup post).
  found.sort((a, b) => (b.recipeIngredient ? 1 : 0) - (a.recipeIngredient ? 1 : 0));
  return found;
}

function normalizeSchemaRecipe(recipe, url) {
  const title = stripHtml(recipe.name || "");

  let ingredients = recipe.recipeIngredient || recipe.ingredients || [];
  if (typeof ingredients === "string") ingredients = ingredients.split(/\n+/);
  ingredients = ingredients.map(stripHtml).filter(Boolean);

  const steps = flattenInstructions(recipe.recipeInstructions);

  let image = "";
  const img = recipe.image;
  if (img) {
    if (typeof img === "string") image = img;
    else if (Array.isArray(img)) image = typeof img[0] === "string" ? img[0] : ((img[0] && img[0].url) || "");
    else if (img.url) image = img.url;
  }

  const macros = {};
  if (recipe.nutrition) {
    const n = recipe.nutrition;
    if (n.calories) macros.calories = stripHtml(String(n.calories));
    if (n.proteinContent) macros.protein = stripHtml(String(n.proteinContent));
    if (n.carbohydrateContent) macros.carbs = stripHtml(String(n.carbohydrateContent));
    if (n.fatContent) macros.fat = stripHtml(String(n.fatContent));
  }

  let yieldVal = recipe.recipeYield || recipe.yield || "";
  if (Array.isArray(yieldVal)) yieldVal = yieldVal.join(", ");
  const notes = yieldVal ? `Yield/servings as listed on the source page: ${stripHtml(String(yieldVal))}.` : "";

  return { title, ingredients, steps, image, macros, sourceLink: url, tags: [], notes };
}

// Fallback for sites with no JSON-LD — scan for markup from the most
// common recipe-card plugins, plus generic schema.org microdata.
function findRecipeViaCommonMarkup(doc) {
  const candidates = [
    { title: ".wprm-recipe-name", ing: ".wprm-recipe-ingredient", steps: ".wprm-recipe-instruction-text, .wprm-recipe-instruction-text p" },
    { title: ".tasty-recipes-title", ing: ".tasty-recipes-ingredients-body li, .tasty-recipes-ingredients li", steps: ".tasty-recipes-instructions-body li, .tasty-recipes-instructions li" },
    { title: ".mv-create-title", ing: ".mv-create-ingredients li", steps: ".mv-create-instructions li" },
    { title: ".easyrecipe .ERSName", ing: ".easyrecipe .ingredient", steps: ".easyrecipe .instruction" },
    { title: "[itemprop='name']", ing: "[itemprop='recipeIngredient'], [itemprop='ingredients']", steps: "[itemprop='recipeInstructions'] li" }
  ];
  for (const c of candidates) {
    const ingEls = doc.querySelectorAll(c.ing);
    if (ingEls.length === 0) continue;
    const titleEl = doc.querySelector(c.title);
    let stepEls = doc.querySelectorAll(c.steps);
    let steps = Array.from(stepEls).map(e => e.textContent.trim()).filter(Boolean);
    if (steps.length === 0) {
      // Some plugins put all instructions as one block with no <li>s.
      const block = doc.querySelector(c.steps.split(",")[0].replace(/ li.*$/, ""));
      if (block) steps = flattenInstructions(block.innerHTML);
    }
    return {
      title: titleEl ? stripHtml(titleEl.textContent) : "",
      ingredients: Array.from(ingEls).map(e => stripHtml(e.textContent)).filter(Boolean),
      steps,
      image: "",
      macros: {},
      sourceLink: "",
      tags: [],
      notes: ""
    };
  }
  return null;
}

function fillGapsFromMeta(doc, result) {
  if (!result.title) {
    const og = doc.querySelector('meta[property="og:title"]');
    const t = doc.querySelector("title");
    result.title = stripHtml((og && og.content) || (t && t.textContent) || "");
  }
  if (!result.image) {
    const og = doc.querySelector('meta[property="og:image"]');
    if (og && og.content) result.image = og.content;
  }
  return result;
}

async function tryFetchRecipe(url) {
  const html = await fetchHtmlSomehow(url);
  if (!html) return null;
  const doc = new DOMParser().parseFromString(html, "text/html");

  let result = null;
  const jsonLdMatches = findRecipesInJsonLd(doc);
  if (jsonLdMatches.length > 0) {
    result = normalizeSchemaRecipe(jsonLdMatches[0], url);
  }

  if (!result || result.ingredients.length === 0) {
    const markupResult = findRecipeViaCommonMarkup(doc);
    if (markupResult && markupResult.ingredients.length > 0) {
      result = { ...markupResult, sourceLink: url };
    }
  }

  if (!result) return null;
  return fillGapsFromMeta(doc, result);
}

// ------------------------------------------------------------------
// EXPORT — bakes everything currently in localStorage (recipes you
// added on-page, tag edits, deletions) into a fresh copy of THIS
// exact file, with an updated SEED_RECIPES list. Download it and
// upload it to GitHub (overwriting index.html) to make your changes
// permanent and visible on every device — not just this browser.
//
// This only works when the page is actually being served over
// http(s) (e.g. your live GitHub Pages URL). It can't fetch its own
// source when opened directly from a folder on your computer
// (file://), because browsers block that for security reasons.
// ------------------------------------------------------------------
async function exportUpdatedFile() {
  const status = document.getElementById("exportStatus");
  status.textContent = "Building your updated file…";
  try {
    const res = await fetch(window.location.href, { cache: "no-store" });
    if (!res.ok) throw new Error("Couldn't read the current page source.");
    const html = await res.text();

    const startMarker = "const SEED_RECIPES = [";
    const startIdx = html.indexOf(startMarker);
    const endOfArrayIdx = html.indexOf("\n];", startIdx); // start of the "];" line closing SEED_RECIPES
    if (startIdx === -1 || endOfArrayIdx === -1) throw new Error("Couldn't find the recipe list in this page's source.");
    const afterArrayLineIdx = html.indexOf("\n", endOfArrayIdx + 1) + 1; // just past the "];" line

    const merged = getAllRecipes();
    const before = html.slice(0, startIdx);
    const after = html.slice(afterArrayLineIdx);
    const output = before + "const SEED_RECIPES = " + JSON.stringify(merged, null, 2) + ";\n" + after;

    const blob = new Blob([output], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "recipe-box.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    // Everything is now baked into the exported file, so clear local
    // additions/edits in THIS browser to avoid duplicates once the
    // new file is uploaded and reopened here.
    localStorage.removeItem(LS_KEYS.userRecipes);
    localStorage.removeItem(LS_KEYS.deletedIds);
    localStorage.removeItem(LS_KEYS.tagOverrides);
    userRecipes = [];
    deletedIds = [];
    tagOverrides = {};

    status.textContent = "Downloaded! Upload this file to GitHub (overwrite index.html) to make it permanent everywhere.";
  } catch (err) {
    status.textContent = "Export failed — this only works when the page is hosted online (not opened from a local file). Error: " + err.message;
  }
}
document.getElementById("exportFileBtn").addEventListener("click", exportUpdatedFile);

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

  searchTerm = e.target.value;

startTaglineRotation();
