// ------------------------------------------------------------------
// SHOPPING LIST UI — a persistent overlay reachable from the header
// button. Items accumulate across recipes (never auto-cleared) and
// are grouped by which recipe they came from, with checkboxes to
// tick items off while shopping and clear actions once you're done.
// ------------------------------------------------------------------
function updateShoppingListBtn() {
  const btn = document.getElementById("shoppingListBtn");
  const count = getUncheckedShoppingCount();
  btn.textContent = count > 0 ? `🛒 Shopping List (${count})` : "🛒 Shopping List";
  btn.classList.toggle("has-items", count > 0);
}

function renderShoppingList() {
  const modal = document.getElementById("shoppingModal");
  const groups = [];
  const groupIndex = {};
  shoppingList.forEach(item => {
    if (!(item.recipeId in groupIndex)) {
      groupIndex[item.recipeId] = groups.length;
      groups.push({ recipeTitle: item.recipeTitle, items: [] });
    }
    groups[groupIndex[item.recipeId]].items.push(item);
  });

  modal.innerHTML = `
    <button class="close-btn" onclick="closeShoppingList()">✕</button>
    <div class="shopping-header-row">
      <h2>🛒 Shopping List</h2>
      <div class="shopping-header-actions">
        <button type="button" id="clearCheckedBtn">Clear checked</button>
        <button type="button" id="clearAllListBtn">Clear all</button>
      </div>
    </div>
    ${shoppingList.length === 0
      ? `<div class="shopping-empty">Your shopping list is empty. Open any recipe with ingredients and hit "🛒 Add to List" to start building one up.</div>`
      : groups.map(g => `
          <div class="shopping-group">
            <div class="shopping-group-title">${escapeHtml(g.recipeTitle)}</div>
            <ul>
              ${g.items.map(item => `
                <li class="shopping-item ${item.checked ? "checked" : ""}">
                  <label>
                    <input type="checkbox" data-id="${item.id}" ${item.checked ? "checked" : ""}>
                    <span>${escapeHtml(item.text)}</span>
                  </label>
                  <button type="button" class="shopping-remove" data-id="${item.id}" title="Remove">×</button>
                </li>
              `).join("")}
            </ul>
          </div>
        `).join("")
    }
  `;

  if (shoppingList.length > 0) {
    document.getElementById("clearCheckedBtn").addEventListener("click", () => {
      clearCheckedShoppingItems();
      renderShoppingList();
      updateShoppingListBtn();
    });
    document.getElementById("clearAllListBtn").addEventListener("click", () => {
      showConfirm(
        "Clear the entire shopping list? This can't be undone.",
        () => { clearAllShoppingItems(); renderShoppingList(); updateShoppingListBtn(); },
        { confirmLabel: "Clear all", cancelLabel: "Cancel", danger: true }
      );
    });
    modal.querySelectorAll(".shopping-item input[type=checkbox]").forEach(cb => {
      cb.addEventListener("change", () => {
        toggleShoppingItem(cb.getAttribute("data-id"));
        renderShoppingList();
        updateShoppingListBtn();
      });
    });
    modal.querySelectorAll(".shopping-remove").forEach(btn => {
      btn.addEventListener("click", () => {
        removeShoppingItem(btn.getAttribute("data-id"));
        renderShoppingList();
        updateShoppingListBtn();
      });
    });
  }
}
function openShoppingList() {
  renderShoppingList();
  document.getElementById("shoppingOverlay").classList.add("open");
}
function closeShoppingList() {
  document.getElementById("shoppingOverlay").classList.remove("open");
}
document.getElementById("shoppingOverlay").addEventListener("click", (e) => {
  if (e.target.id === "shoppingOverlay") closeShoppingList();
});
document.getElementById("shoppingListBtn").addEventListener("click", openShoppingList);

// ------------------------------------------------------------------
// MEAL PLANNER UI — one colored table per week, stacked. Cell edits
// save immediately but don't trigger a full re-render (so focus/
// cursor position isn't lost while typing); only add/delete week
// re-renders the whole overlay.
// ------------------------------------------------------------------
function plannerWeekBlockHtml(week, index) {
  const colorClass = `planner-color-${index % 6}`;
  return `
    <div class="planner-week-block ${colorClass}">
      <div class="planner-week-header">
        <span>Week ${index + 1}</span>
        <button type="button" class="planner-delete-week" data-week="${week.id}" title="Delete this week">×</button>
      </div>
      <div class="planner-table-wrap">
        <table class="planner-table">
          <thead><tr><th></th>${PLANNER_DAYS.map(d => `<th>${d}</th>`).join("")}</tr></thead>
          <tbody>
            ${PLANNER_MEALS.map(m => `
              <tr>
                <th>${PLANNER_MEAL_LABELS[m]}</th>
                ${PLANNER_DAYS.map(d => `<td><input type="text" class="planner-cell" data-week="${week.id}" data-day="${d}" data-meal="${m}" value="${escapeHtml(week.days[d][m] || "")}"></td>`).join("")}
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}
function renderMealPlanner() {
  const modal = document.getElementById("mealPlannerModal");
  modal.innerHTML = `
    <button class="close-btn" onclick="closeMealPlanner()">✕</button>
    <div class="planner-header-row">
      <h2>📅 Meal Planner</h2>
      <div class="planner-header-actions">
        <button type="button" id="addWeekBtn">+ Add Week</button>
      </div>
    </div>
    <div id="plannerWeeks">${mealPlanWeeks.map((w, i) => plannerWeekBlockHtml(w, i)).join("")}</div>
  `;
  document.getElementById("addWeekBtn").addEventListener("click", () => {
    addMealPlanWeek();
    renderMealPlanner();
  });
  modal.querySelectorAll(".planner-delete-week").forEach(btn => {
    btn.addEventListener("click", () => {
      const weekId = btn.getAttribute("data-week");
      showConfirm(
        "Delete this week from the meal planner? This can't be undone.",
        () => { deleteMealPlanWeek(weekId); renderMealPlanner(); },
        { confirmLabel: "Delete", cancelLabel: "Cancel", danger: true }
      );
    });
  });
  modal.querySelectorAll(".planner-cell").forEach(input => {
    input.addEventListener("input", () => {
      setMealPlanCell(input.getAttribute("data-week"), input.getAttribute("data-day"), input.getAttribute("data-meal"), input.value);
    });
  });
}
function openMealPlanner() {
  if (mealPlanWeeks.length === 0) addMealPlanWeek();
  renderMealPlanner();
  document.getElementById("mealPlannerOverlay").classList.add("open");
}
function closeMealPlanner() {
  document.getElementById("mealPlannerOverlay").classList.remove("open");
}
document.getElementById("mealPlannerOverlay").addEventListener("click", (e) => {
  if (e.target.id === "mealPlannerOverlay") closeMealPlanner();
});
document.getElementById("openMealPlannerBtn").addEventListener("click", openMealPlanner);

// ------------------------------------------------------------------
// "ADD TO PLANNER" PICKER — a quick popup opened from any recipe
// modal so a recipe's title can be dropped straight into a meal
// planner slot without retyping it by hand. Sits above the recipe
// modal (higher z-index) since it's opened from within it.
// ------------------------------------------------------------------
function renderPlannerPicker(recipeId, recipeTitle) {
  const modal = document.getElementById("plannerPickModal");
  modal.innerHTML = `
    <button class="close-btn" onclick="closePlannerPicker()">✕</button>
    <h3 style="margin-top:0;">📅 Add "${escapeHtml(recipeTitle)}" to Planner</h3>
    <div class="planner-pick-field">
      <label>Week</label>
      <select id="pickWeekSelect">${mealPlanWeeks.map((w, i) => `<option value="${w.id}">Week ${i + 1}</option>`).join("")}</select>
    </div>
    <div class="planner-pick-field">
      <label>Day</label>
      <select id="pickDaySelect">${PLANNER_DAYS.map(d => `<option value="${d}">${d}</option>`).join("")}</select>
    </div>
    <div class="planner-pick-field">
      <label>Meal</label>
      <select id="pickMealSelect">${PLANNER_MEALS.map(m => `<option value="${m}">${PLANNER_MEAL_LABELS[m]}</option>`).join("")}</select>
    </div>
    <div class="planner-pick-actions">
      <button type="button" class="cancel-btn" onclick="closePlannerPicker()">Cancel</button>
      <button type="button" id="confirmPlannerPickBtn">Add to Planner</button>
    </div>
  `;
  document.getElementById("confirmPlannerPickBtn").addEventListener("click", () => {
    const weekId = document.getElementById("pickWeekSelect").value;
    const day = document.getElementById("pickDaySelect").value;
    const meal = document.getElementById("pickMealSelect").value;
    const week = mealPlanWeeks.find(w => w.id === weekId);
    const existing = week && week.days[day][meal];
    const doSet = () => {
      setMealPlanCell(weekId, day, meal, recipeTitle);
      closePlannerPicker();
    };
    if (existing && existing.trim()) {
      showConfirm(
        `That slot already has "${existing}" — replace it with "${recipeTitle}"?`,
        doSet,
        { confirmLabel: "Replace", cancelLabel: "Cancel", danger: true }
      );
    } else {
      doSet();
    }
  });
}
function openPlannerPicker(recipeId, recipeTitle) {
  if (mealPlanWeeks.length === 0) addMealPlanWeek();
  renderPlannerPicker(recipeId, recipeTitle);
  document.getElementById("plannerPickOverlay").classList.add("open");
}
function closePlannerPicker() {
  document.getElementById("plannerPickOverlay").classList.remove("open");
}
document.getElementById("plannerPickOverlay").addEventListener("click", (e) => {
  if (e.target.id === "plannerPickOverlay") closePlannerPicker();
});

function isIdeaOnly(r) {
  return (!r.ingredients || !r.ingredients.length) && (!r.steps || !r.steps.length);
}

document.querySelectorAll("#ideasFilter .ideas-filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    ideaFilterMode = btn.getAttribute("data-mode");
    document.querySelectorAll("#ideasFilter .ideas-filter-btn").forEach(b => {
      b.classList.toggle("active", b === btn);
    });
    renderGrid();
  });
});

function allTags() {
  const set = new Set();
  getAllRecipes().forEach(r => r.tags.forEach(t => set.add(t)));
  return Array.from(set).sort();
}

function renderTagBar() {
  const bar = document.getElementById("tagBar");
  bar.innerHTML = "";
  if (activeTags.size > 0) {
    const clear = document.createElement("div");
    clear.className = "tag-chip";
    clear.style.fontWeight = "700";
    clear.textContent = "✕ Clear filters";
    clear.onclick = () => {
      activeTags.clear();
      renderTagBar();
      renderGrid();
    };
    bar.appendChild(clear);
  }
  allTags().forEach(tag => {
    const chip = document.createElement("div");
    chip.className = "tag-chip cat-" + tagCategory(tag) + (activeTags.has(tag) ? " active" : "");
    chip.textContent = tag;
    chip.onclick = () => {
      if (activeTags.has(tag)) activeTags.delete(tag);
      else activeTags.add(tag);
      renderTagBar();
      renderGrid();
    };
    bar.appendChild(chip);
  });
}

function renderTagSummary() {
  const container = document.getElementById("tagSummary");
  const counts = {};
  getAllRecipes().forEach(r => (r.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
  const tags = Object.keys(counts).sort();

  if (tags.length === 0) {
    container.innerHTML = `<div class="tag-summary-empty">Tag counts will show up here once a few recipes are in.</div>`;
    return;
  }

  container.innerHTML = tags.map(t =>
    `<span class="tag-pill summary-pill cat-${tagCategory(t)}" data-tag="${escapeHtml(t)}">${escapeHtml(t)} · ${counts[t]}</span>`
  ).join("");

  container.querySelectorAll(".summary-pill").forEach(el => {
    el.addEventListener("click", () => {
      const tag = el.getAttribute("data-tag");
      if (activeTags.has(tag)) activeTags.delete(tag);
      else activeTags.add(tag);
      renderTagBar();
      renderGrid();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function matchesSearch(r, term) {
  if (!term) return true;
  const hay = [r.title, r.notes, ...(r.tags||[]), ...(r.ingredients||[]), ...(r.tips||[])].join(" ").toLowerCase();
  return hay.includes(term.toLowerCase());
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count");
  grid.innerHTML = "";

  const all = getAllRecipes();

  if (all.length === 0) {
    countEl.textContent = "";
    grid.innerHTML = `<div class="empty">No recipes yet — send some screenshots over, paste a link, or hit "+ Add Recipe" above.</div>`;
    return;
  }

  const filtered = all.filter(r => {
    const tagOk = activeTags.size === 0 || Array.from(activeTags).every(t => r.tags.includes(t));
    const isIdea = isIdeaOnly(r);
    const ideaOk = ideaFilterMode === "all" ||
      (ideaFilterMode === "full" && !isIdea) ||
      (ideaFilterMode === "ideas" && isIdea);
    const favOk = !favoritesOnly || r.favorite;
    return tagOk && ideaOk && favOk && matchesSearch(r, searchTerm);
  });

  countEl.textContent = `${filtered.length} recipe${filtered.length === 1 ? "" : "s"}`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">No recipes match. Try clearing the search, tag filter, ideas filter, or favorites filter.</div>`;
    return;
  }

  filtered.forEach((r) => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openModal(r.id);
    const isIdea = isIdeaOnly(r);
    const rating = getRatingEntry(r.id).rating;
    card.innerHTML = `
      <button type="button" class="fav-star-btn ${r.favorite ? "is-fav" : ""}" data-id="${escapeHtml(r.id)}" title="${r.favorite ? "Remove from favorites" : "Add to favorites"}">${r.favorite ? "♥" : "♡"}</button>
      ${isIdea ? `<span class="idea-badge" title="Idea — no full recipe yet">*</span>` : ""}
      ${r.image ? `<img class="card-img" src="${escapeHtml(r.image)}" alt="${escapeHtml(r.title)}">` : ""}
      <div class="card-body">
        <h3>${escapeHtml(r.title)}</h3>
        <div class="card-tags">${r.tags.map(tagPillHtml).join("")}</div>
      </div>
      ${r.cookCount > 0 ? `<span class="cook-count-badge">🍳 ${r.cookCount}×</span>` : ""}
      ${rating !== null ? `<span class="rating-badge" style="background:${ratingColor(rating)}" title="Your rating: ${rating}/10">${rating}</span>` : ""}
    `;
    card.querySelector(".fav-star-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      toggleFavorite(r.id);
      renderGrid();
    });
    grid.appendChild(card);
  });
}

function tagOptionGroupsHtml(currentTags) {
  const labels = { meal: "Meal type", protein: "Protein", method: "Method", vibe: "Vibe" };
  let html = "";
  for (const cat in TAG_CATEGORIES) {
    const opts = TAG_CATEGORIES[cat].filter(t => !currentTags.includes(t));
    if (opts.length === 0) continue;
    html += `<optgroup label="${labels[cat]}">` +
      opts.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("") +
      `</optgroup>`;
  }
  return html;
}

function openModal(id) {
  const r = getAllRecipes().find(x => x.id === id);
  if (!r) return;
  currentScaleFactor = 1;
  const modal = document.getElementById("modal");
  const hasIngredients = r.ingredients && r.ingredients.length > 0;
  const ratingEntry = getRatingEntry(id);
  const isRated = ratingEntry.rating !== null;
  const sliderValue = isRated ? ratingEntry.rating : 5;
  modal.innerHTML = `
    <button class="close-btn no-print" onclick="closeModal()">✕</button>
    ${r.image ? `<img class="modal-img" src="${escapeHtml(r.image)}" alt="${escapeHtml(r.title)}">` : `<div class="modal-img-placeholder no-print">📷 No photo yet</div>`}
    <div class="modal-title-row" id="modalTitleRow">
      <h2 id="modalTitleText">${escapeHtml(r.title)}</h2>
      <button type="button" class="modal-fav-btn no-print ${r.favorite ? "is-fav" : ""}" id="modalFavBtn" title="${r.favorite ? "Remove from favorites" : "Add to favorites"}">${r.favorite ? "♥" : "♡"}</button>
      <button type="button" class="title-edit-btn no-print" id="editTitleBtn" title="Rename recipe">✎</button>
    </div>
    <div class="modal-section cook-tracker-row no-print">
      <button type="button" class="cook-btn" id="cookedThisBtn">🍳 I cooked this!</button>
      <button type="button" class="cook-undo-btn" id="cookUndoBtn" title="Undo — subtract one" style="${r.cookCount > 0 ? "" : "display:none;"}">↺ Undo</button>
      <span class="cook-count-text" id="cookCountText">${r.cookCount > 0 ? `Cooked ${r.cookCount} time${r.cookCount === 1 ? "" : "s"}` : "Not logged yet"}</span>
    </div>
    <div class="modal-section no-print">
      <div class="rating-row">
        <span class="rating-label">Your rating:</span>
        <span class="rating-clear-btn" id="ratingClearBtn" style="${isRated ? "" : "display:none;"}">clear</span>
      </div>
      <div class="rating-slider-row">
        <span class="rating-scale-label">1</span>
        <input type="range" min="1" max="10" step="1" class="rating-slider ${isRated ? "" : "unrated"}" id="ratingSlider" value="${sliderValue}">
        <span class="rating-scale-label">10</span>
        <span class="rating-value-badge ${isRated ? "" : "unrated"}" id="ratingValueBadge" style="${isRated ? `background:${ratingColor(sliderValue)}` : ""}">${isRated ? sliderValue : "–"}</span>
      </div>
      <textarea class="personal-note-field" id="personalNoteField" placeholder="Personal note (only you see this)…">${escapeHtml(ratingEntry.note || "")}</textarea>
    </div>
    <div class="card-tags no-print" id="modalTagList">
      ${r.tags.map(t => `<span class="tag-pill cat-${tagCategory(t)}">${escapeHtml(t)}<button class="tag-remove" data-tag="${escapeHtml(t)}" title="Remove tag">×</button></span>`).join("")}
    </div>
    <div class="add-tag-row no-print">
      <select id="addTagSelect">
        <option value="">+ add a tag…</option>
        ${tagOptionGroupsHtml(r.tags)}
      </select>
      <input type="text" id="addTagCustom" placeholder="or type a custom tag">
      <button type="button" id="addTagBtn">Add</button>
    </div>
    ${hasIngredients ? `<div class="modal-section">
      <h4>Ingredients</h4>
      <div class="scale-row no-print" id="scaleRow">
        <span class="scale-label">Scale:</span>
        ${[0.5, 1, 1.5, 2, 3].map(f => `<button type="button" class="scale-btn ${f === 1 ? "active" : ""}" data-scale="${f}">${f}x</button>`).join("")}
      </div>
      <ul id="ingredientsList">${renderIngredientsListHtml(r.ingredients, 1)}</ul>
    </div>` : ""}
    ${(r.steps && r.steps.length) ? `<div class="modal-section">
      <h4>Steps</h4>
      <ol>${r.steps.map(s => `<li>${escapeHtml(metricify(s))}</li>`).join("")}</ol>
    </div>` : ""}
    ${(!r.ingredients || !r.ingredients.length) && (!r.steps || !r.steps.length) ? `<div class="modal-section"><div class="idea-note">💡 Just an idea for now — full recipe not written up yet.</div></div>` : ""}
    ${macrosHtml(r)}
    ${hasIngredients ? `<div class="scale-hint no-print">Scaling adjusts ingredient amounts only — macros above are for the original (1x) recipe.</div>` : ""}
    ${r.notes ? `<div class="modal-section"><h4>Notes</h4><div>${escapeHtml(r.notes)}</div></div>` : ""}
    ${(r.tips && r.tips.length) ? `<div class="modal-section"><h4>Tips from other cooks</h4><ul>${r.tips.map(t => `<li>${escapeHtml(t)}</li>`).join("")}</ul></div>` : ""}
    ${r.sourceLink ? `<div class="modal-section no-print"><a class="source-link" href="${escapeHtml(r.sourceLink)}" target="_blank" rel="noopener">View original ↗</a></div>` : ""}
    <div class="modal-section modal-actions-row no-print">
      <button type="button" class="add-to-planner-btn" id="addToPlannerBtn">📅 Add to Planner</button>
      ${hasIngredients ? `<button type="button" class="add-to-list-btn" id="addToListBtn">🛒 Add to List</button>` : ""}
      <button type="button" class="print-recipe-btn" id="printRecipeBtn">🖨️ Print</button>
      <button type="button" class="delete-recipe-btn" id="deleteRecipeBtn">Delete this recipe</button>
    </div>
  `;

  modal.querySelectorAll(".scale-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentScaleFactor = parseFloat(btn.getAttribute("data-scale"));
      modal.querySelectorAll(".scale-btn").forEach(b => b.classList.toggle("active", b === btn));
      document.getElementById("ingredientsList").innerHTML = renderIngredientsListHtml(r.ingredients, currentScaleFactor);
    });
  });

  document.getElementById("printRecipeBtn").addEventListener("click", () => {
    window.print();
  });

  document.getElementById("addToPlannerBtn").addEventListener("click", () => {
    openPlannerPicker(id, r.title);
  });

  document.getElementById("modalFavBtn").addEventListener("click", () => {
    toggleFavorite(id);
    openModal(id);
    renderGrid();
  });

  const ratingSlider = document.getElementById("ratingSlider");
  const ratingValueBadge = document.getElementById("ratingValueBadge");
  const ratingClearBtn = document.getElementById("ratingClearBtn");
  ratingSlider.addEventListener("input", () => {
    const val = parseInt(ratingSlider.value, 10);
    ratingSlider.classList.remove("unrated");
    ratingValueBadge.classList.remove("unrated");
    ratingValueBadge.textContent = val;
    ratingValueBadge.style.background = ratingColor(val);
    ratingClearBtn.style.display = "";
    setRating(id, val);
    renderGrid();
  });
  ratingClearBtn.addEventListener("click", () => {
    clearRating(id);
    openModal(id);
    renderGrid();
  });
  document.getElementById("personalNoteField").addEventListener("input", (e) => {
    setNote(id, e.target.value);
  });

  if (hasIngredients) {
    document.getElementById("addToListBtn").addEventListener("click", () => {
      const scaledIngredients = r.ingredients.map(i => scaleIngredientText(i, currentScaleFactor));
      addRecipeToShoppingList(id, r.title, scaledIngredients);
      updateShoppingListBtn();
      const btn = document.getElementById("addToListBtn");
      const original = btn.textContent;
      btn.textContent = "✓ Added";
      setTimeout(() => { btn.textContent = original; }, 1200);
    });
  }

  function refreshCookUi() {
    const count = getCookCount(id);
    document.getElementById("cookCountText").textContent = count > 0 ? `Cooked ${count} time${count === 1 ? "" : "s"}` : "Not logged yet";
    document.getElementById("cookUndoBtn").style.display = count > 0 ? "" : "none";
    renderGrid();
  }
  document.getElementById("cookedThisBtn").addEventListener("click", () => {
    incrementCookCount(id);
    refreshCookUi();
  });
  document.getElementById("cookUndoBtn").addEventListener("click", () => {
    decrementCookCount(id);
    refreshCookUi();
  });

  modal.querySelectorAll(".tag-remove").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const tag = btn.getAttribute("data-tag");
      const fresh = getAllRecipes().find(x => x.id === id);
      setRecipeTags(id, fresh.tags.filter(t => t !== tag));
      openModal(id);
      renderTagBar(); renderGrid(); renderTagSummary();
    });
  });

  document.getElementById("addTagBtn").addEventListener("click", () => {
    const select = document.getElementById("addTagSelect");
    const custom = document.getElementById("addTagCustom");
    const newTag = (custom.value.trim() || select.value || "").toLowerCase().trim();
    if (!newTag) return;
    const fresh = getAllRecipes().find(x => x.id === id);
    if (!fresh.tags.includes(newTag)) {
      setRecipeTags(id, [...fresh.tags, newTag]);
    }
    openModal(id);
    renderTagBar(); renderGrid(); renderTagSummary();
  });

  document.getElementById("deleteRecipeBtn").addEventListener("click", () => {
    showConfirm(
      `Delete "${r.title}"? This removes it from this browser's recipe box.`,
      () => {
        deleteRecipeById(id);
        closeModal();
        renderTagBar(); renderGrid(); renderTagSummary();
      },
      { confirmLabel: "Delete", cancelLabel: "Cancel", danger: true }
    );
  });

  document.getElementById("editTitleBtn").addEventListener("click", () => {
    const row = document.getElementById("modalTitleRow");
    const current = getAllRecipes().find(x => x.id === id).title;
    row.innerHTML = `
      <input type="text" id="titleEditInput" value="${escapeHtml(current)}">
      <button type="button" id="titleSaveBtn">Save</button>
      <button type="button" id="titleCancelBtn">Cancel</button>
    `;
    const input = document.getElementById("titleEditInput");
    input.focus();
    input.select();
    const save = () => {
      const val = input.value.trim();
      if (val && val !== current) {
        setRecipeTitle(id, val);
        renderTagBar(); renderGrid(); renderTagSummary();
      }
      openModal(id);
    };
    document.getElementById("titleSaveBtn").addEventListener("click", save);
    document.getElementById("titleCancelBtn").addEventListener("click", () => openModal(id));
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") save();
      if (e.key === "Escape") openModal(id);
    });
  });

  document.getElementById("overlay").classList.add("open");
}
function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}
document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") closeModal();
});

// ------------------------------------------------------------------
// CUSTOM CONFIRM DIALOG — used instead of the browser's native
// confirm() for anything destructive (deleting a recipe, saving a
// likely duplicate). Native confirm() can be flaky or get silently
// suppressed in some mobile/in-app browsers, so this is a small
// in-page overlay that always renders the same way everywhere.
// ------------------------------------------------------------------
function showConfirm(message, onConfirm, opts) {
  opts = opts || {};
  const confirmLabel = opts.confirmLabel || "OK";
  const cancelLabel = opts.cancelLabel || "Cancel";
  const danger = opts.danger !== false;
  const modal = document.getElementById("confirmModal");
  modal.innerHTML = `
    <p class="confirm-message">${escapeHtml(message)}</p>
    <div class="confirm-actions">
      <button type="button" class="cancel-btn" id="confirmCancelBtn">${escapeHtml(cancelLabel)}</button>
      <button type="button" class="${danger ? "delete-recipe-btn" : "cook-btn"}" id="confirmOkBtn">${escapeHtml(confirmLabel)}</button>
    </div>
  `;
  const overlay = document.getElementById("confirmOverlay");
  overlay.classList.add("open");
  const close = () => overlay.classList.remove("open");
  document.getElementById("confirmCancelBtn").addEventListener("click", close);
  document.getElementById("confirmOkBtn").addEventListener("click", () => {
    close();
    onConfirm();
  });
}
document.getElementById("confirmOverlay").addEventListener("click", (e) => {
  if (e.target.id === "confirmOverlay") e.currentTarget.classList.remove("open");
});

// ------------------------------------------------------------------
// ADD RECIPE FORM — manual entry, plus a best-effort "auto-fill from
// URL" engine. The auto-fill only works when a site publishes
// structured Recipe data (schema.org JSON-LD), which most recipe
// blogs do, but not all. When it can't find that data, or the fetch
// itself fails (some sites block cross-origin requests), just fill
// the form in by hand — or send the link back in a Cowork chat and
// it'll get added properly there instead.
// ------------------------------------------------------------------
function checkboxGroupsHtml(selectedTags) {
  const labels = { meal: "Meal type", protein: "Protein", method: "Method", vibe: "Vibe" };
  return Object.keys(TAG_CATEGORIES).map(cat => `
    <div>
      <div class="checkbox-group-label">${labels[cat]}</div>
      <div class="checkbox-options">
        ${TAG_CATEGORIES[cat].map(t => `
          <label>
            <input type="checkbox" value="${escapeHtml(t)}" ${selectedTags.includes(t) ? "checked" : ""}>
            ${escapeHtml(t)}
          </label>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function renderAddForm(prefill) {
  prefill = prefill || {};
  const modal = document.getElementById("formModal");
  modal.innerHTML = `
    <button class="close-btn" onclick="closeAddForm()">✕</button>
    <h2>Add a Recipe</h2>
    <div class="form-field">
      <label>Recipe URL (optional — try auto-fill)</label>
      <div class="fetch-row">
        <input type="url" id="fUrl" placeholder="https://example.com/recipe" value="${escapeHtml(prefill.sourceLink || "")}">
        <button type="button" id="fetchBtn">Try Auto-Fill</button>
      </div>
      <div class="fetch-status" id="fetchStatus"></div>
      <div class="form-hint">Works on sites that publish structured recipe data — not guaranteed everywhere. If it doesn't work, fill in the fields by hand, or send the link back in chat.</div>
    </div>
    <div class="form-field">
      <label>Title</label>
      <input type="text" id="fTitle" value="${escapeHtml(prefill.title || "")}">
      <div id="dupWarning"></div>
    </div>
    <div class="form-field">
      <label>Image URL (optional)</label>
      <input type="text" id="fImage" value="${escapeHtml(prefill.image || "")}">
    </div>
    <div class="form-field">
      <label>Ingredients (one per line)</label>
      <textarea id="fIngredients">${escapeHtml((prefill.ingredients || []).join("\n"))}</textarea>
    </div>
    <div class="form-field">
      <label>Steps (one per line)</label>
      <textarea id="fSteps">${escapeHtml((prefill.steps || []).join("\n"))}</textarea>
    </div>
    <div class="form-hint" style="margin-bottom:14px;">Macros aren't entered by hand anymore — they're calculated automatically from whatever you put in the ingredients list above, once you save.</div>
    <div class="form-field">
      <label>Notes (optional)</label>
      <textarea id="fNotes" style="min-height:50px;">${escapeHtml(prefill.notes || "")}</textarea>
    </div>
    <div class="form-field">
      <label>Tags</label>
      <div class="checkbox-groups" id="fTagGroups">${checkboxGroupsHtml(prefill.tags || [])}</div>
      <input type="text" id="fCustomTags" placeholder="Custom tags, comma-separated" style="margin-top:10px;">
    </div>
    <div class="form-actions">
      <button type="button" id="saveRecipeBtn">Save Recipe</button>
      <button type="button" class="cancel-btn" onclick="closeAddForm()">Cancel</button>
    </div>
  `;

  function renderDupWarning() {
    const el = document.getElementById("dupWarning");
    const title = document.getElementById("fTitle").value;
    const matches = findSimilarRecipes(title);
    if (!el) return;
    if (matches.length === 0) { el.innerHTML = ""; return; }
    el.innerHTML = `<div class="dup-warning-box">⚠️ This looks similar to ${matches.length === 1 ? "a recipe" : "recipes"} already in the box: ${matches.map(m => `<strong>${escapeHtml(m.recipe.title)}</strong>`).join(", ")}. You can still save it — just flagging it in case it's a duplicate.</div>`;
  }
  document.getElementById("fTitle").addEventListener("input", renderDupWarning);
  renderDupWarning();

  document.getElementById("fetchBtn").addEventListener("click", async () => {
    const url = document.getElementById("fUrl").value.trim();
    const status = document.getElementById("fetchStatus");
    if (!url) { status.textContent = "Enter a URL first."; return; }
    status.textContent = "Fetching… this can take a few seconds.";
    const result = await tryFetchRecipe(url);
    if (result) {
      status.textContent = "Got it — review everything below before saving.";
      renderAddForm(result);
    } else {
      status.textContent = "Couldn't auto-fill from this page. Fill in the fields manually, or send the link back in chat.";
    }
  });

  document.getElementById("saveRecipeBtn").addEventListener("click", () => {
    const title = document.getElementById("fTitle").value.trim();
    if (!title) { alert("Give the recipe a title first."); return; }

    const doSave = () => {
      const checked = Array.from(document.querySelectorAll("#fTagGroups input:checked")).map(cb => cb.value);
      const custom = document.getElementById("fCustomTags").value.split(",").map(t => t.trim().toLowerCase()).filter(Boolean);
      const tags = Array.from(new Set([...checked, ...custom]));

      const recipe = {
        title,
        tags,
        source: "Added on page",
        sourceLink: document.getElementById("fUrl").value.trim(),
        image: document.getElementById("fImage").value.trim(),
        ingredients: document.getElementById("fIngredients").value.split("\n").map(s => s.trim()).filter(Boolean),
        steps: document.getElementById("fSteps").value.split("\n").map(s => s.trim()).filter(Boolean),
        notes: document.getElementById("fNotes").value.trim()
      };
      // If auto-fill pulled official macros from the source page, keep them
      // around as a reference note alongside the auto-calculated estimate.
      if (prefill.macros && Object.keys(prefill.macros).length > 0) recipe.macros = prefill.macros;

      addUserRecipe(recipe);
      closeAddForm();
      renderTagBar(); renderGrid(); renderTagSummary();
    };

    const strongMatches = findSimilarRecipes(title, 0.75);
    if (strongMatches.length > 0) {
      const names = strongMatches.map(m => `"${m.recipe.title}"`).join(", ");
      showConfirm(
        `This looks a lot like an existing recipe (${names}). Save it anyway as a new, separate recipe?`,
        doSave,
        { confirmLabel: "Save anyway", cancelLabel: "Cancel", danger: false }
      );
    } else {
      doSave();
    }
  });
}

function openAddForm() {

// ------------------------------------------------------------------
// URL AUTO-FILL ENGINE
// Tries several strategies, in order, since recipe sites vary a lot:
//   1. Fetch the page directly (works if the site allows cross-origin
//      requests — rare, but free when it happens).
//   2. Fall back through a few public CORS proxies.
//   3. Look for schema.org Recipe data (JSON-LD) — most recipe blogs
//      publish this, even ones with very different visual layouts.
//      Handles nested @graph/mainEntity wrappers, HowTo sections,
//      and HTML-flavored ingredient/instruction text.
//   4. If no JSON-LD Recipe is found, fall back to scanning for
//      common recipe-plugin markup (WP Recipe Maker, Tasty Recipes,
//      Mediavine Create, and generic microdata itemprops).
//   5. Fill any still-missing title/image from basic page meta tags.
// None of this is guaranteed — some sites block all of it. When it
// fails, fill the form in by hand, or send the link back in chat.
// ------------------------------------------------------------------
function stripHtml(str) {
  if (!str) return "";
  const div = document.createElement("div");
  div.innerHTML = String(str);
  return div.textContent.replace(/\s+/g, " ").trim();
}

async function fetchHtmlSomehow(url) {
  const attempts = [
    () => fetch(url),
    () => fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url)),
    () => fetch("https://corsproxy.io/?url=" + encodeURIComponent(url)),
    () => fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url)),
    () => fetch("https://r.jina.ai/" + url)
  ];
  for (const attempt of attempts) {
    try {
      const res = await attempt();
      if (!res || !res.ok) continue;
      const text = await res.text();
      if (text && text.length > 200) return text;
    } catch (e) { /* try the next approach */ }
  }
  return null;
}

function flattenInstructions(instr) {
  if (!instr) return [];
  if (typeof instr === "string") {
    const div = document.createElement("div");
    div.innerHTML = instr;
    const items = Array.from(div.querySelectorAll("li, p")).map(el => el.textContent.trim()).filter(Boolean);
    if (items.length > 0) return items;
    return stripHtml(instr).split(/\n+/).map(s => s.trim()).filter(Boolean);
  }
  if (Array.isArray(instr)) {
    let out = [];
    instr.forEach(item => {
      if (item == null) return;
      if (typeof item === "string") { out.push(stripHtml(item)); return; }
      if (item.itemListElement) { out = out.concat(flattenInstructions(item.itemListElement)); return; }
      out.push(stripHtml(item.text || item.name || ""));
    });
    return out.filter(Boolean);
  }
  return [];
}

function findRecipesInJsonLd(doc) {
  const found = [];
  function collect(node) {
    if (!node) return;
    if (Array.isArray(node)) { node.forEach(collect); return; }
    if (typeof node !== "object") return;
    const type = node["@type"];
    const isRecipe = type === "Recipe" || (Array.isArray(type) && type.includes("Recipe"));
    if (isRecipe) found.push(node);
    if (node["@graph"]) collect(node["@graph"]);
    if (node.mainEntity) collect(node.mainEntity);
    if (node.itemListElement) collect(node.itemListElement);
  }
  doc.querySelectorAll('script[type="application/ld+json"]').forEach(script => {
    try { collect(JSON.parse(script.textContent)); } catch (e) { /* skip malformed blocks */ }
  });
  // Prefer entries that actually list ingredients, in case a page has
  // more than one Recipe block (e.g. a roundup post).
  found.sort((a, b) => (b.recipeIngredient ? 1 : 0) - (a.recipeIngredient ? 1 : 0));
  return found;
}

// A handful of non-standard sites put ingredients as objects instead of
// plain strings (e.g. {name:"flour", amount:"2 cups"}) — build a readable
// line out of whatever text-ish fields are present rather than stringifying
// the object as "[object Object]".
function ingredientToText(item) {
  if (item == null) return "";
  if (typeof item === "string") return item;
  if (typeof item === "object") {
    const amount = item.amount || item.quantity || "";
    const unit = item.unit || "";
    const name = item.name || item.text || item.ingredient || "";
    return [amount, unit, name].filter(Boolean).join(" ").trim();
  }
  return String(item);
}

// Resolve a possibly-relative image URL against the page it came from, so
// images still load correctly when the recipe is viewed from a different
// origin (this file on GitHub Pages, opened locally, etc).
function resolveImageUrl(src, pageUrl) {
  if (!src) return "";
  try { return new URL(src, pageUrl).href; } catch (e) { return src; }
}

function normalizeSchemaRecipe(recipe, url) {
  const title = stripHtml(recipe.name || "");

  let ingredients = recipe.recipeIngredient || recipe.ingredients || [];
  if (typeof ingredients === "string") ingredients = ingredients.split(/\n+/);
  ingredients = ingredients.map(i => stripHtml(ingredientToText(i))).filter(Boolean);

  const steps = flattenInstructions(recipe.recipeInstructions);

  let image = "";
  const img = recipe.image;
  if (img) {
    if (typeof img === "string") image = img;
    else if (Array.isArray(img)) {
      const first = img[0];
      image = typeof first === "string" ? first : ((first && (first.url || first.contentUrl)) || "");
    }
    else image = img.url || img.contentUrl || "";
  }
  image = resolveImageUrl(image, url);

  const macros = {};
  if (recipe.nutrition) {
    const n = recipe.nutrition;
    if (n.calories) macros.calories = stripHtml(String(n.calories));
    if (n.proteinContent) macros.protein = stripHtml(String(n.proteinContent));
    if (n.carbohydrateContent) macros.carbs = stripHtml(String(n.carbohydrateContent));
    if (n.fatContent) macros.fat = stripHtml(String(n.fatContent));
  }

  let yieldVal = recipe.recipeYield || recipe.yield || "";
  if (Array.isArray(yieldVal)) yieldVal = yieldVal.join(", ");
  const notes = yieldVal ? `Yield/servings as listed on the source page: ${stripHtml(String(yieldVal))}.` : "";

  return { title, ingredients, steps, image, macros, sourceLink: url, tags: [], notes };
}

// Fallback for sites with no JSON-LD — scan for markup from the most
// common recipe-card plugins, plus generic schema.org microdata.
function findRecipeViaCommonMarkup(doc) {
  const candidates = [
    { title: ".wprm-recipe-name", ing: ".wprm-recipe-ingredient", steps: ".wprm-recipe-instruction-text, .wprm-recipe-instruction-text p" },
    { title: ".tasty-recipes-title", ing: ".tasty-recipes-ingredients-body li, .tasty-recipes-ingredients li", steps: ".tasty-recipes-instructions-body li, .tasty-recipes-instructions li" },
    { title: ".mv-create-title", ing: ".mv-create-ingredients li", steps: ".mv-create-instructions li" },
    { title: ".easyrecipe .ERSName", ing: ".easyrecipe .ingredient", steps: ".easyrecipe .instruction" },
    { title: "[itemprop='name']", ing: "[itemprop='recipeIngredient'], [itemprop='ingredients']", steps: "[itemprop='recipeInstructions'] li" }
  ];
  for (const c of candidates) {
    const ingEls = doc.querySelectorAll(c.ing);
    if (ingEls.length === 0) continue;
    const titleEl = doc.querySelector(c.title);
    let stepEls = doc.querySelectorAll(c.steps);
    let steps = Array.from(stepEls).map(e => e.textContent.trim()).filter(Boolean);
    if (steps.length === 0) {
      // Some plugins put all instructions as one block with no <li>s.
      const block = doc.querySelector(c.steps.split(",")[0].replace(/ li.*$/, ""));
      if (block) steps = flattenInstructions(block.innerHTML);
    }
    return {
      title: titleEl ? stripHtml(titleEl.textContent) : "",
      ingredients: Array.from(ingEls).map(e => stripHtml(e.textContent)).filter(Boolean),
      steps,
      image: "",
      macros: {},
      sourceLink: "",
      tags: [],
      notes: ""
    };
  }
  return null;
}

function fillGapsFromMeta(doc, result, pageUrl) {
  if (!result.title) {
    const og = doc.querySelector('meta[property="og:title"]');
    const t = doc.querySelector("title");
    result.title = stripHtml((og && og.content) || (t && t.textContent) || "");
  }
  if (!result.image) {
    const og = doc.querySelector('meta[property="og:image"]');
    if (og && og.content) result.image = resolveImageUrl(og.content, pageUrl);
  }
  return result;
}

async function tryFetchRecipe(url) {
  const html = await fetchHtmlSomehow(url);
  if (!html) return null;
  const doc = new DOMParser().parseFromString(html, "text/html");

  let result = null;
  const jsonLdMatches = findRecipesInJsonLd(doc);
  if (jsonLdMatches.length > 0) {
    result = normalizeSchemaRecipe(jsonLdMatches[0], url);
  }

  if (!result || result.ingredients.length === 0) {
    const markupResult = findRecipeViaCommonMarkup(doc);
    if (markupResult && markupResult.ingredients.length > 0) {
      result = { ...markupResult, sourceLink: url };
    }
  }

  if (!result) return null;
  return fillGapsFromMeta(doc, result, url);
}

// ------------------------------------------------------------------
// EXPORT — bakes everything currently in localStorage (recipes you
// added on-page, tag edits, deletions) into a fresh copy of THIS
// exact file, with an updated SEED_RECIPES list. Download it and
// upload it to GitHub (overwriting index.html) to make your changes
// permanent and visible on every device — not just this browser.
//
// This only works when the page is actually being served over
// http(s) (e.g. your live GitHub Pages URL). It can't fetch its own
// source when opened directly from a folder on your computer
// (file://), because browsers block that for security reasons.
// ------------------------------------------------------------------
async function exportUpdatedFile() {
  const status = document.getElementById("exportStatus");
  status.textContent = "Building your updated file…";
  try {
    const res = await fetch(window.location.href, { cache: "no-store" });
    if (!res.ok) throw new Error("Couldn't read the current page source.");
    const html = await res.text();

    const startMarker = "const SEED_RECIPES = [";
    const startIdx = html.indexOf(startMarker);
    const endOfArrayIdx = html.indexOf("\n];", startIdx); // start of the "];" line closing SEED_RECIPES
    if (startIdx === -1 || endOfArrayIdx === -1) throw new Error("Couldn't find the recipe list in this page's source.");
    const afterArrayLineIdx = html.indexOf("\n", endOfArrayIdx + 1) + 1; // just past the "];" line

    // favorite/cookCount are live, per-browser localStorage state (like this
    // browser's copy of tag/title edits) — not something that should get
    // baked into every recipe's source entry, so strip them back out before
    // writing the exported file.
    const merged = getAllRecipes().map(({ favorite, cookCount, ...rest }) => rest);
    const before = html.slice(0, startIdx);
    const after = html.slice(afterArrayLineIdx);
    const output = before + "const SEED_RECIPES = " + JSON.stringify(merged, null, 2) + ";\n" + after;

    const blob = new Blob([output], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "recipe-box.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    // Everything is now baked into the exported file, so clear local
    // additions/edits in THIS browser to avoid duplicates once the
    // new file is uploaded and reopened here.
    localStorage.removeItem(LS_KEYS.userRecipes);
    localStorage.removeItem(LS_KEYS.deletedIds);
    localStorage.removeItem(LS_KEYS.tagOverrides);
    localStorage.removeItem(LS_KEYS.titleOverrides);
    userRecipes = [];
    deletedIds = [];
    tagOverrides = {};
    titleOverrides = {};

    status.textContent = "Downloaded! Upload this file to GitHub (overwrite index.html) to make it permanent everywhere.";
  } catch (err) {
    status.textContent = "Export failed — this only works when the page is hosted online (not opened from a local file). Error: " + err.message;
  }
}
document.getElementById("exportFileBtn").addEventListener("click", exportUpdatedFile);

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

document.getElementById("search").addEventListener("input", (e) => {
  searchTerm = e.target.value;
  renderGrid();
});

function pickRandomVisibleRecipe() {
  const all = getAllRecipes();
  if (all.length === 0) return null;
  const filtered = all.filter(r => {
    const tagOk = activeTags.size === 0 || Array.from(activeTags).every(t => r.tags.includes(t));
    return tagOk && matchesSearch(r, searchTerm);
  });
  const pool = filtered.length ? filtered : all;
  return pool[Math.floor(Math.random() * pool.length)];
}

document.getElementById("randomRecipeBtn").addEventListener("click", (e) => {
  const btn = e.currentTarget;
  btn.classList.remove("spin");
  void btn.offsetWidth; // restart animation if clicked again quickly
  btn.classList.add("spin");
  const r = pickRandomVisibleRecipe();
  if (r) openModal(r.id);
});

renderTagBar();
renderGrid();
renderTagSummary();
updateShoppingListBtn();
startTaglineRotation();
