<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Beata's Recipe Box</title>
<style>
  :root {
    --bg: #fbf9ff;
    --card: #ffffff;
    --ink: #2b2440;
    --muted: #7a7292;
    --purple: #8b5cf6;
    --pink: #ec4899;
    --teal: #2dd4bf;
    --accent: #8b5cf6;
    --accent-soft: #f1e9ff;
    --border: #e9e3f5;
    --gradient: linear-gradient(120deg, var(--purple), var(--pink), var(--teal));

    /* tag category colors: meal type / protein / method / other */
    --meal-bg: #f1e9ff;   --meal-text: #6d28d9;   --meal-solid: #8b5cf6;
    --protein-bg: #fde7f3; --protein-text: #be185d; --protein-solid: #ec4899;
    --method-bg: #e3f9f6; --method-text: #0f766e;  --method-solid: #2dd4bf;
    --other-bg: #eef0f4;  --other-text: #55596b;   --other-solid: #55596b;
    --sunset-soft: linear-gradient(120deg, #fef3e2, #fde3d3, #fbdbe0);
    --sunset-text: #9a3412;
    --sunset-solid: linear-gradient(120deg, #fbbf24, #f97316, #ef4444);
  }
  * { box-sizing: border-box; }
  /* Global hover "pop" for clickable elements — layers on top of each
     component's own hover styles (which handle background/color) by
     only touching transform/filter, so nothing conflicts. */
  button:not(:disabled), .tag-chip, .rating-clear-btn {
    transition: transform .15s ease, filter .15s ease;
  }
  button:not(:disabled):hover, .tag-chip:hover, .rating-clear-btn:hover {
    transform: translateY(-1px) scale(1.06);
    filter: brightness(1.12) saturate(1.35);
  }
  button:not(:disabled):active, .tag-chip:active, .rating-clear-btn:active {
    transform: translateY(0) scale(0.96);
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    position: relative;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(40% 40% at 15% 20%, rgba(139,92,246,0.14), transparent 70%),
      radial-gradient(35% 35% at 85% 15%, rgba(236,72,153,0.12), transparent 70%),
      radial-gradient(45% 45% at 50% 95%, rgba(20,184,166,0.11), transparent 70%);
    filter: blur(60px);
    z-index: -1;
    pointer-events: none;
  }
  header {
    padding: 28px 24px 18px;
    max-width: 1000px;
    margin: 0 auto;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 28px;
  }
  .grad-text {
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
  }
  .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 18px;
    min-height: 18px;
    transition: opacity .4s ease;
  }
  .tagline-attr {
    font-style: italic;
    opacity: 0.75;
  }
  .controls {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .search-row {
    display: flex;
    gap: 10px;
  }
  #search {
    flex: 1;
    width: 100%;
    padding: 12px 16px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--ink);
  }
  .add-recipe-btn {
    flex-shrink: 0;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    background: var(--gradient);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(139,92,246,0.25);
  }
  @media (max-width: 640px) {
    .search-row { flex-wrap: wrap; }
    .search-row input { flex-basis: 100%; }
  }
  /* ---------------- Mobile phones ---------------- */
  @media (max-width: 600px) {
    header { padding: 20px 16px 14px; }
    h1 { font-size: 23px; }
    .controls, .grid, #count, .tag-summary, .export-footer, .empty {
      padding-left: 16px;
      padding-right: 16px;
    }
    .grid { grid-template-columns: 1fr; gap: 14px; margin-bottom: 40px; }
    .card h3 { font-size: 16px; }
    /* bigger touch targets */
    .add-recipe-btn { padding: 0 16px; min-height: 44px; font-size: 14px; }
    #search { min-height: 44px; font-size: 16px; } /* 16px avoids iOS auto-zoom on focus */
    .dice-btn { width: 44px; height: 44px; }
    .tag-chip { padding: 8px 13px; font-size: 13px; }
    /* modal: use nearly the full screen, less padding wasted */
    .overlay { padding: 0; align-items: flex-end; }
    .modal {
      max-width: 100%;
      width: 100%;
      max-height: 92vh;
      border-radius: 18px 18px 0 0;
      padding: 20px 16px 24px;
    }
    .modal h2, #modalTitleText { font-size: 19px; }
    #titleEditInput { font-size: 17px; }
    .modal .close-btn {
      top: 12px; right: 12px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--other-bg);
      border-radius: 50%;
    }
    .title-edit-btn, .tag-remove { padding: 6px; }
    /* keep long links/notes/ingredient text from overflowing horizontally */
    .modal, .card, .modal-section, .source-link, .idea-note, .macro-disclaimer, .macro-source-ref {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .macro-grid { grid-template-columns: repeat(2, 1fr); }
    .fetch-row { flex-direction: column; }
    .fetch-row button { width: 100%; }
    .form-actions { flex-direction: column; }
    .form-actions button { width: 100%; }
    .tag-summary-list { gap: 6px; }
  }
  @media (max-width: 380px) {
    h1 { font-size: 20px; }
    .idea-badge { font-size: 20px; }
  }
  .export-footer {
    max-width: 1000px;
    margin: 0 auto 50px;
    padding: 24px 24px 0;
    text-align: center;
  }
  .export-btn {
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    color: var(--other-text);
    background: var(--other-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
  }
  .export-btn:hover { background: var(--other-solid); color: #fff; }
  .export-footer .fetch-status { margin-top: 8px; }
  #search:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.15), 0 0 0 6px rgba(20,184,166,0.08);
  }
  .tag-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .ideas-filter {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .ideas-filter-btn {
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .ideas-filter-btn.active {
    background: var(--gradient);
    border-color: transparent;
    color: #fff;
  }
  .favorites-toggle-btn {
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-left: auto;
  }
  .favorites-toggle-btn.active {
    background: linear-gradient(135deg, #fb7185, var(--pink));
    border-color: transparent;
    color: #fff;
  }
  .shopping-list-btn {
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .shopping-list-btn.has-items {
    background: linear-gradient(135deg, #4ee0b0, #2dd4bf);
    border-color: transparent;
    color: #fff;
  }
  .ideas-filter-btn:hover,
  .favorites-toggle-btn:hover,
  .shopping-list-btn:hover {
    background: linear-gradient(135deg, #7fcdc0, #3d9188);
    border-color: transparent;
    color: #fff;
  }
  .rating-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    z-index: 2;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .card { position: relative; }
  .fav-star-btn {
    position: absolute;
    top: 8px;
    left: 8px;
    z-index: 2;
    border: none;
    background: rgba(255,255,255,0.85);
    border-radius: 999px;
    width: 28px;
    height: 28px;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .fav-star-btn.is-fav { color: var(--pink); }
  .fav-star-btn:not(.is-fav) { color: #cbd5e1; }
  .cook-count-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    z-index: 2;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
  }
  .modal-fav-btn {
    border: none;
    background: none;
    color: #cbd5e1;
    cursor: pointer;
    font-size: 20px;
    padding: 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .modal-fav-btn.is-fav { color: var(--pink); }
  .cook-tracker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .cook-btn {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  .cook-btn:hover { background: var(--bg); }
  .cook-undo-btn {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
  }
  .cook-undo-btn:hover { color: var(--ink); background: var(--bg); }
  .cook-count-text { font-size: 13px; color: var(--muted); }
  .tag-chip {
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    user-select: none;
  }
  .tag-chip.cat-meal    { background: var(--meal-bg);    color: var(--meal-text);    border-color: transparent; }
  .tag-chip.cat-protein { background: var(--protein-bg); color: var(--protein-text); border-color: transparent; }
  .tag-chip.cat-method  { background: var(--method-bg);  color: var(--method-text);  border-color: transparent; }
  .tag-chip.cat-other   { background: var(--other-bg);   color: var(--other-text);   border-color: transparent; }

  .tag-chip.cat-meal.active    { background: var(--meal-solid);    color: #fff; box-shadow: 0 2px 8px rgba(139,92,246,0.25); }
  .tag-chip.cat-protein.active { background: var(--protein-solid); color: #fff; box-shadow: 0 2px 8px rgba(236,72,153,0.25); }
  .tag-chip.cat-method.active  { background: var(--method-solid);  color: #fff; box-shadow: 0 2px 8px rgba(20,184,166,0.25); }
  .tag-chip.cat-other.active   { background: var(--other-solid);   color: #fff; box-shadow: 0 2px 8px rgba(85,89,107,0.25); }
  .tag-chip.cat-vibe    { background: var(--sunset-soft); color: var(--sunset-text); border-color: transparent; }
  .tag-chip.cat-vibe.active { background: var(--sunset-solid); color: #fff; box-shadow: 0 2px 8px rgba(249,115,22,0.3); }
  #count {
    max-width: 1000px;
    margin: 14px auto 0;
    padding: 0 24px;
    font-size: 13px;
    color: var(--muted);
  }
  .grid {
    max-width: 1000px;
    margin: 12px auto 60px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: box-shadow .2s ease, transform .2s ease;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    box-shadow: 0 16px 32px rgba(139,92,246,0.22), 0 6px 16px rgba(236,72,153,0.16), 0 2px 8px rgba(45,212,191,0.18);
    transform: translateY(-5px) scale(1.015);
  }
  .card:hover .card-img { filter: saturate(1.15) brightness(1.03); }
  .card:hover .card-body::before { height: 8px; filter: saturate(1.3) brightness(1.1); }
  .card-img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
    transition: filter .2s ease;
  }
  .idea-badge {
    position: absolute;
    top: 6px;
    right: 10px;
    z-index: 2;
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
    color: #2f9bff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    cursor: default;
  }
  .card-body {
    position: relative;
    padding: 20px 18px 16px;
  }
  .card-body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--gradient);
    transition: height .2s ease, filter .2s ease;
  }
  .card h3 {
    margin: 0 0 6px;
    font-size: 17px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0 10px;
  }
  .tag-pill {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 700;
    letter-spacing: .2px;
  }
  .tag-pill.cat-meal    { background: var(--meal-bg);    color: var(--meal-text); }
  .tag-pill.cat-protein { background: var(--protein-bg); color: var(--protein-text); }
  .tag-pill.cat-method  { background: var(--method-bg);  color: var(--method-text); }
  .tag-pill.cat-other   { background: var(--other-bg);   color: var(--other-text); }
  .tag-pill.cat-vibe    { background: var(--sunset-soft); color: var(--sunset-text); }
  .empty {
    max-width: 1000px;
    margin: 60px auto;
    text-align: center;
    color: var(--muted);
    padding: 0 24px;
  }
  /* modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .overlay.open { display: flex; }
  #confirmOverlay { z-index: 60; } /* sits above the recipe/add-recipe modals */
  .confirm-modal {
    max-width: 380px;
  }
  .confirm-message {
    margin: 0 0 20px;
    font-size: 15px;
    line-height: 1.5;
  }
  .confirm-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .modal {
    background: var(--card);
    border-radius: 16px;
    max-width: 560px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 26px 28px;
    position: relative;
  }
  .modal h2 { margin-top: 0; }
  .modal-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-title-row h2 { flex: 1; }
  .title-edit-btn {
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .title-edit-btn:hover { color: var(--ink); }
  #titleEditInput {
    flex: 1;
    font-size: 20px;
    font-weight: 700;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--ink);
    font-family: inherit;
  }
  #titleSaveBtn, #titleCancelBtn {
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #titleSaveBtn {
    border: none;
    background: var(--gradient);
    color: #fff;
  }
  #titleCancelBtn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
  }
  .modal-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 16px;
    display: block;
  }
  .modal-img-placeholder {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    margin-bottom: 16px;
    border: 1.5px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
  }
  .idea-note {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }
  .modal .close-btn {
    position: absolute;
    top: 16px;
    right: 18px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    transition: color .15s;
  }
  .modal .close-btn:hover {
    color: var(--pink);
  }
  .modal-section {
    margin-top: 16px;
  }
  .modal-section h4 {
    margin: 0 0 8px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .5px;
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
  }
  .modal-section ul, .modal-section ol {
    margin: 0;
    padding-left: 20px;
  }
  .modal-section li { margin-bottom: 4px; }
  .macro-disclaimer {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 6px;
  }
  .macro-source-ref {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .tag-remove {
    border: none;
    background: none;
    color: inherit;
    opacity: 0.6;
    cursor: pointer;
    font-size: 12px;
    margin-left: 4px;
    padding: 0;
    line-height: 1;
  }
  .tag-remove:hover { opacity: 1; }
  .add-tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0 6px;
  }
  .add-tag-row select,
  .add-tag-row input[type="text"] {
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--ink);
    font-family: inherit;
  }
  .add-tag-row input[type="text"] { flex: 1; min-width: 120px; }
  .add-tag-row button {
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border: none;
    border-radius: 8px;
    background: var(--gradient);
    color: #fff;
    cursor: pointer;
  }
  .delete-recipe-btn {
    font-size: 13px;
    font-weight: 600;
    color: #b91c1c;
    background: #fef2f2;
    border: 1px solid #fecaca;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  .delete-recipe-btn:hover { background: #fee2e2; }
  .print-recipe-btn {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 8px;
  }
  .print-recipe-btn:hover { background: var(--bg); }
  .add-to-list-btn {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 8px;
  }
  .add-to-list-btn:hover { background: var(--bg); }
  .add-to-planner-btn {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 8px;
  }
  .add-to-planner-btn:hover { background: var(--bg); }
  #plannerPickOverlay { z-index: 65; } /* sits above the recipe modal it's opened from */
  .planner-pick-field { margin-bottom: 12px; }
  .planner-pick-field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .planner-pick-field select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
  }
  .planner-pick-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
  }
  .planner-pick-actions button { font-family: inherit; }
  #confirmPlannerPickBtn {
    border: none;
    background: var(--gradient);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 16px;

      "herbatniki petitki białe i kakaowe (lub inne wg uznania, byle dające się szczelnie ułożyć na formie)",

    steps: [
      "Ugotować masę budyniową – zagotować 1 szklankę mleka z łyżką masła, zdjąć z ognia i wlać rozmieszane w drugiej szklance mleka budynie, intensywnie mieszając żeby nie porobiły się grudki, zagotować (rada: do mieszania budyniu użyć miksera na wolnych obrotach), odstawić do ostudzenia.",
      "Formę średniej wielkości wyłożyć papierem do pieczenia, ułożyć warstwę białych ciastek, następnie wyłożyć na nie ciepły budyń i równo rozprowadzić (ciepły budyń łatwiej się rozprowadza niż zimny), następnie ułożyć warstwę ciemnych ciastek lekko dociskając aby była równa powierzchnia.",

    steps: [
      "Preheat the oven to 400°F. Rub the potato with oil and a light sprinkle of salt. Bake directly on the oven rack or on a tray for 1 hour, or until fork-tender and crispy on the outside.",
      "Let the potato cool slightly — just enough to handle without burning your fingers. Slice it in half lengthwise.",
      "Carefully scoop out the inside of each half, leaving a sturdy shell.",
      "In a bowl, mix the scooped potato with the chicken, cheese, BBQ sauce, and spices.",
      "Spoon the filling back into the potato halves. Top with extra cheese if you like. Bake at 425°F for 12–15 minutes, or until the tops are melted and golden. Broil for the last couple minutes for a crispier finish.",
      "Top with ranch and sliced scallions. Serve with homemade coleslaw for the perfect summer plate."
    ],
    notes: "Makes 1 serving (2 stuffed potato halves)."
  },

    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

let userRecipes = lsGet(LS_KEYS.userRecipes, []);
let deletedIds = lsGet(LS_KEYS.deletedIds, []);
let tagOverrides = lsGet(LS_KEYS.tagOverrides, {});
let titleOverrides = lsGet(LS_KEYS.titleOverrides, {});
let favorites = lsGet(LS_KEYS.favorites, []); // array of recipe ids
let cookCounts = lsGet(LS_KEYS.cookCounts, {}); // { [id]: number }
let ratings = lsGet(LS_KEYS.ratings, {}); // { [id]: { rating: "up"|"meh"|"down"|null, note: "" } }
let shoppingList = lsGet(LS_KEYS.shoppingList, []); // [{ id, text, recipeId, recipeTitle, checked }]

function isFavorite(id) { return favorites.includes(id); }
function toggleFavorite(id) {
  favorites = isFavorite(id) ? favorites.filter(x => x !== id) : [...favorites, id];
  lsSet(LS_KEYS.favorites, favorites);
}
function getCookCount(id) { return cookCounts[id] || 0; }
function incrementCookCount(id) {
  cookCounts = { ...cookCounts, [id]: getCookCount(id) + 1 };
  lsSet(LS_KEYS.cookCounts, cookCounts);
}
function decrementCookCount(id) {
  cookCounts = { ...cookCounts, [id]: Math.max(0, getCookCount(id) - 1) };
  lsSet(LS_KEYS.cookCounts, cookCounts);
}

// ------------------------------------------------------------------
// PERSONAL RATINGS & NOTES — a private, per-browser "would I make
// this again" rating plus a free-text note, separate from the
// recipe's own source notes. Purely local state, like favorites and
// the cook counter — never baked into the exported SEED_RECIPES.
// ------------------------------------------------------------------
function getRatingEntry(id) {
  const entry = ratings[id];
  // Numbers only — a leftover "up"/"meh"/"down" string from an earlier
  // version of this feature is treated as unrated rather than crashing.
  const rating = entry && typeof entry.rating === "number" ? entry.rating : null;
  return { rating, note: (entry && entry.note) || "" };
}
function setRating(id, rating) {
  const current = getRatingEntry(id);
  ratings = { ...ratings, [id]: { ...current, rating } };
  lsSet(LS_KEYS.ratings, ratings);
}
function clearRating(id) {
  const current = getRatingEntry(id);
  ratings = { ...ratings, [id]: { ...current, rating: null } };
  lsSet(LS_KEYS.ratings, ratings);
}
// Purple -> pink -> teal (the app's own gradient palette), used for both
// the modal slider readout and the small card badge, so a rating is
// recognizable at a glance without clashing with the rest of the design.
function mixHexColors(hex1, hex2, t) {
  const c1 = parseInt(hex1.slice(1), 16), c2 = parseInt(hex2.slice(1), 16);
  const r1 = (c1 >> 16) & 255, g1 = (c1 >> 8) & 255, b1 = c1 & 255;
  const r2 = (c2 >> 16) & 255, g2 = (c2 >> 8) & 255, b2 = c2 & 255;
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return `rgb(${r}, ${g}, ${b})`;
}
function ratingColor(n) {
  const PURPLE = "#8b5cf6", PINK = "#ec4899", TEAL = "#2dd4bf";
  const t = (n - 1) / 9; // 0..1
  return t <= 0.5 ? mixHexColors(PURPLE, PINK, t / 0.5) : mixHexColors(PINK, TEAL, (t - 0.5) / 0.5);
}
function setNote(id, note) {
  const current = getRatingEntry(id);
  ratings = { ...ratings, [id]: { ...current, note } };
  lsSet(LS_KEYS.ratings, ratings);
}

// ------------------------------------------------------------------
// SHOPPING LIST — accumulates ingredients across multiple recipes
// (adding a new recipe does NOT clear what's already there) so it
// works as a running list you build up before a grocery run.
// ------------------------------------------------------------------
function uid() {
  return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7);
}
function addRecipeToShoppingList(recipeId, recipeTitle, ingredientTexts) {
  const newItems = ingredientTexts.map(text => ({
    id: uid(),
    text,
    recipeId,
    recipeTitle,
    checked: false
  }));
  shoppingList = [...shoppingList, ...newItems];
  lsSet(LS_KEYS.shoppingList, shoppingList);
}
function toggleShoppingItem(itemId) {
  shoppingList = shoppingList.map(item => item.id === itemId ? { ...item, checked: !item.checked } : item);
  lsSet(LS_KEYS.shoppingList, shoppingList);
}
function removeShoppingItem(itemId) {
  shoppingList = shoppingList.filter(item => item.id !== itemId);
  lsSet(LS_KEYS.shoppingList, shoppingList);
}
function clearCheckedShoppingItems() {
  shoppingList = shoppingList.filter(item => !item.checked);
  lsSet(LS_KEYS.shoppingList, shoppingList);
}
function clearAllShoppingItems() {
  shoppingList = [];
  lsSet(LS_KEYS.shoppingList, shoppingList);
}
function getUncheckedShoppingCount() {
  return shoppingList.filter(item => !item.checked).length;
}

// ------------------------------------------------------------------
// WEEKLY MEAL PLANNER — repeating colored weekly blocks (Mon-Sun x
// Breakfast/Lunch/Dinner/Supper), modeled on paper/spreadsheet
// planners. Cells are free text (not locked to saved recipes) since
// real meal planning mixes recipe names, quick descriptions, and
// leftovers. Weeks accumulate as a running log; add or delete blocks
// as needed.
// ------------------------------------------------------------------
const PLANNER_DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const PLANNER_MEALS = ["breakfast", "lunch", "dinner", "supper"];
const PLANNER_MEAL_LABELS = { breakfast: "Breakfast", lunch: "Lunch", dinner: "Dinner", supper: "Supper" };

let mealPlanWeeks = lsGet(LS_KEYS.mealPlanWeeks, []); // [{ id, days: { Mon: {breakfast,lunch,dinner,supper}, ... } }]

function emptyPlannerDays() {
  const days = {};
  PLANNER_DAYS.forEach(d => { days[d] = { breakfast: "", lunch: "", dinner: "", supper: "" }; });
  return days;
}
function addMealPlanWeek() {
  mealPlanWeeks = [...mealPlanWeeks, { id: uid(), days: emptyPlannerDays() }];
  lsSet(LS_KEYS.mealPlanWeeks, mealPlanWeeks);
}
function deleteMealPlanWeek(weekId) {
  mealPlanWeeks = mealPlanWeeks.filter(w => w.id !== weekId);
  lsSet(LS_KEYS.mealPlanWeeks, mealPlanWeeks);
}
function setMealPlanCell(weekId, day, meal, value) {
  mealPlanWeeks = mealPlanWeeks.map(w =>
    w.id === weekId ? { ...w, days: { ...w.days, [day]: { ...w.days[day], [meal]: value } } } : w
  );
  lsSet(LS_KEYS.mealPlanWeeks, mealPlanWeeks);
}

function getAllRecipes() {
  return [...SEED_RECIPES, ...userRecipes]
    .filter(r => !deletedIds.includes(r.id))
    .map(r => {
      let out = r;
      if (tagOverrides[r.id]) out = { ...out, tags: tagOverrides[r.id] };
      if (titleOverrides[r.id]) out = { ...out, title: titleOverrides[r.id] };
      out = { ...out, favorite: isFavorite(r.id), cookCount: getCookCount(r.id) };
      return out;
    });
}

// ------------------------------------------------------------------
// DUPLICATE DETECTION — a lightweight title-similarity check used by
// the Add Recipe form to flag "this might already be in the box"
// before saving. Not exact-match only: it also catches close titles
// (extra words, reordered words, minor spelling differences) via a
// word-overlap score, so it works across the mix of English/Polish/
// German titles already in the box.
// ------------------------------------------------------------------
function normalizeForCompare(s) {
  return (s || "")
    .toLowerCase()
    .replace(/ł/g, "l") // Polish ł doesn't decompose under NFD like ą/ć/ś do, so map it explicitly or it gets silently dropped below
    .normalize("NFD").replace(/\p{Diacritic}/gu, "") // strip accents/diacritics
    .replace(/[-_/]+/g, " ") // treat hyphens/underscores/slashes as word separators, not deletions
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
function titleSimilarity(a, b) {
  const na = normalizeForCompare(a), nb = normalizeForCompare(b);
  if (!na || !nb) return 0;
  if (na === nb) return 1;
  if (na.includes(nb) || nb.includes(na)) return 0.9;
  const wa = new Set(na.split(/\s+/).filter(Boolean));
  const wb = new Set(nb.split(/\s+/).filter(Boolean));
  if (wa.size === 0 || wb.size === 0) return 0;
  const inter = [...wa].filter(w => wb.has(w)).length;
  const union = new Set([...wa, ...wb]).size;
  return union ? inter / union : 0;
}
function findSimilarRecipes(title, threshold) {
  threshold = threshold || 0.5;
  if (!title || !title.trim()) return [];
  return getAllRecipes()
    .map(r => ({ recipe: r, score: titleSimilarity(title, r.title) }))
    .filter(x => x.score >= threshold)
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);
}

function addUserRecipe(recipe) {
  recipe.id = "user-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7);
  userRecipes.push(recipe);
  lsSet(LS_KEYS.userRecipes, userRecipes);
  return recipe.id;
}

function deleteRecipeById(id) {
  if (id.startsWith("user-")) {
    userRecipes = userRecipes.filter(r => r.id !== id);
    lsSet(LS_KEYS.userRecipes, userRecipes);
  } else {
    if (!deletedIds.includes(id)) deletedIds.push(id);
    lsSet(LS_KEYS.deletedIds, deletedIds);
  }
}

function setRecipeTags(id, newTags) {
  if (id.startsWith("user-")) {
    const r = userRecipes.find(x => x.id === id);
    if (r) { r.tags = newTags; lsSet(LS_KEYS.userRecipes, userRecipes); }
  } else {
    tagOverrides[id] = newTags;
    lsSet(LS_KEYS.tagOverrides, tagOverrides);
  }
}

function setRecipeTitle(id, newTitle) {
  newTitle = newTitle.trim();
  if (!newTitle) return;
  if (id.startsWith("user-")) {
    const r = userRecipes.find(x => x.id === id);
    if (r) { r.title = newTitle; lsSet(LS_KEYS.userRecipes, userRecipes); }
  } else {
    titleOverrides[id] = newTitle;
    lsSet(LS_KEYS.titleOverrides, titleOverrides);
  }
}

// TAG TAXONOMY — controls color-coding only. Any tag not listed here
// still works fine, it just renders as a neutral gray "other" tag.
const TAG_CATEGORIES = {
  meal:    ["breakfast", "lunch", "dinner", "snack", "dessert", "drink", "bread", "lunchbox", "salad"],
  protein: ["vegetarian", "chicken", "beef", "fish", "pork", "turkey"],
  method:  ["one-pan", "meal-prep", "make-ahead", "slow-cooker", "air-fryer", "no-cook"],
  vibe:    ["quick", "family-recipe", "tried+liked", "socials-to-try", "summer", "winter", "indulgent", "healthy", "high-protein"]
};
function tagCategory(tag) {
  const t = String(tag).toLowerCase();
  for (const cat in TAG_CATEGORIES) {
    if (TAG_CATEGORIES[cat].includes(t)) return cat;
  }
  return "other";
}
function tagPillHtml(tag) {
  return `<span class="tag-pill cat-${tagCategory(tag)}">${escapeHtml(tag)}</span>`;
}

function findFood(name) {
  const n = name.toLowerCase();
  let best = null, bestLen = 0;
  for (const [key, per100, overrides] of NUTRITION_DB) {
    if (n.includes(key) && key.length > bestLen) {
      best = { key, per100, overrides };
      bestLen = key.length;
    }
  }
  return best;
}

const GENERIC_UNIT_GRAMS = {
  g: 1, kg: 1000, ml: 1, l: 1000,
  cup: 200, tbsp: 15, tsp: 5, oz: 28.35, lb: 453.6
};

function parseQtyToken(tok) {
  if (tok == null) return null;
  tok = tok.replace(/~/g, "").trim();
  if (!tok) return null;
  const range = tok.match(/^(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)$/);
  if (range) return (parseFloat(range[1]) + parseFloat(range[2])) / 2;
  const num = parseFloat(tok);
  return isNaN(num) ? null : num;
}

function preNormalizeQty(text) {
  let t = text;
  const fracMap = { "½":0.5, "¼":0.25, "¾":0.75, "⅓":0.333, "⅔":0.667, "⅛":0.125 };
  t = t.replace(/(\d+)\s*([½¼¾⅓⅔⅛])/g, (m, whole, f) => (parseFloat(whole) + fracMap[f]).toString());
  t = t.replace(/([½¼¾⅓⅔⅛])/g, (m, f) => fracMap[f].toString());
  t = t.replace(/(\d+)\s+(\d+)\/(\d+)/g, (m, w, num, d) => (parseInt(w) + parseInt(num) / parseInt(d)).toString());
  t = t.replace(/(\d+)\/(\d+)/g, (m, num, d) => (parseInt(num) / parseInt(d)).toString());
  return t;
}

const UNIT_WORDS = "kg|g|grams?|kilograms?|ml|l|liters?|cups?|tbsp|tablespoons?|tsp|teaspoons?|oz|ounces?|lbs?|pounds?|cloves?|slices?|cans?|packets?|packs?|pieces?";

function splitCompoundLine(line) {
  let t = line;
  const labelMatch = t.match(/^([A-Za-z][A-Za-z \-]{0,30}):\s*/);
  if (labelMatch) t = t.slice(labelMatch[0].length);
  const startsWithDigit = /^[\d~½¼¾⅓⅔⅛]/.test(t.trim());
  if (!startsWithDigit && t.includes(",")) {
    return t.split(",").map(s => s.trim()).filter(Boolean);
  }
  return [t];
}

function normalizeUnit(u) {
  if (!u) return "";
  u = u.toLowerCase();
  if (/^gram/.test(u)) return "g";
  if (/^kilogram/.test(u)) return "kg";
  if (/^liter/.test(u)) return "l";
  if (/^cup/.test(u)) return "cup";
  if (/^tablespoon/.test(u)) return "tbsp";
  if (/^teaspoon/.test(u)) return "tsp";
  if (/^ounce/.test(u)) return "oz";
  if (/^pound/.test(u)) return "lb";
  if (/^clove/.test(u)) return "clove";
  if (/^slice/.test(u)) return "slice";
  if (/^can/.test(u)) return "can";
  if (/^packet|^pack/.test(u)) return "packet";
  if (/^piece/.test(u)) return "piece";
  return u.replace(/s$/, "");
}

function parseClause(clause) {
  const t = preNormalizeQty(clause);
  const stripped = t.replace(/\([^)]*\)/g, " ").replace(/\s+/g, " ").trim();
  const re = new RegExp("^([\\d.\\-–]+)?\\s*(?:(" + UNIT_WORDS + ")\\b)?\\s*(.*)$", "i");
  const m = stripped.match(re);
  const qty = m ? parseQtyToken(m[1]) : null;
  const unit = m ? normalizeUnit(m[2] || "") : "";
  let name = (m ? m[3] : stripped).replace(/^of\s+/, "").trim();
  return { qty, unit, name: name || stripped };
}

function calcClauseMacros(clause) {
  const { qty, unit, name } = parseClause(clause);
  const food = findFood(name) || findFood(clause);
  if (!food) return { matched: false, macros: [0,0,0,0] };

  let grams;
  if (unit && food.overrides[unit] != null) {
    grams = (qty != null ? qty : 1) * food.overrides[unit];
  } else if (unit && GENERIC_UNIT_GRAMS[unit] != null) {
    grams = (qty != null ? qty : 1) * GENERIC_UNIT_GRAMS[unit];
  } else if (!unit && food.overrides.piece != null) {
    grams = (qty != null ? qty : 1) * food.overrides.piece;
  } else if (!unit && food.overrides.clove != null) {
    grams = (qty != null ? qty : 1) * food.overrides.clove;
  } else if (!unit && qty != null) {
    grams = qty;
  } else if (!unit && qty == null) {
    grams = food.per100.every(v => v === 0) ? 0 : 2;
  } else {
    grams = 0;
  }
  const factor = grams / 100;
  return { matched: true, macros: food.per100.map(v => v * factor) };
}

function calculateRecipeMacros(ingredients) {
  let totals = [0, 0, 0, 0];
  let matchedCount = 0, totalClauses = 0;
  (ingredients || []).forEach(line => {
    splitCompoundLine(line).forEach(clause => {
      totalClauses++;
      const r = calcClauseMacros(clause);
      if (r.matched) {
        matchedCount++;
        for (let i = 0; i < 4; i++) totals[i] += r.macros[i];
      }
    });
  });
  return {
    calories: Math.round(totals[0]),
    protein: Math.round(totals[1] * 10) / 10,
    carbs: Math.round(totals[2] * 10) / 10,
    fat: Math.round(totals[3] * 10) / 10,
    coverage: totalClauses ? Math.round(100 * matchedCount / totalClauses) : 0
  };
}

// ------------------------------------------------------------------
// METRIC CONVERTER
// Appends metric equivalents next to any US/imperial units it finds
// in ingredients or steps — °F, lb/oz, cups, quarts, and inch pan
// sizes — so nothing needs to be rewritten by hand. Runs at display
// time for every recipe, old and new. Skips temperatures that
// already show both units (some recipes already list "200°C/400°F").
// Cup conversions go to mL (an exact volume conversion) rather than
// guessing a gram weight, since that varies by ingredient.
// ------------------------------------------------------------------
const METRIC_QTY_RE = "(\\d+-\\d+\\/\\d+|\\d+\\s+\\d+\\/\\d+|\\d+\\/\\d+|\\d+(?:\\.\\d+)?\\s*[-–]\\s*\\d+(?:\\.\\d+)?|\\d+(?:\\.\\d+)?|[½¼¾⅓⅔⅛])";

function metricQtyToNumber(str) {
  const fracMap = { "½":0.5, "¼":0.25, "¾":0.75, "⅓":1/3, "⅔":2/3, "⅛":0.125 };
  if (fracMap[str] !== undefined) return fracMap[str];
  const hyphenMixed = str.match(/^(\d+)-(\d+)\/(\d+)$/);
  if (hyphenMixed) return parseInt(hyphenMixed[1]) + parseInt(hyphenMixed[2]) / parseInt(hyphenMixed[3]);
  const spaceMixed = str.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (spaceMixed) return parseInt(spaceMixed[1]) + parseInt(spaceMixed[2]) / parseInt(spaceMixed[3]);
  const frac = str.match(/^(\d+)\/(\d+)$/);
  if (frac) return parseInt(frac[1]) / parseInt(frac[2]);
  const range = str.match(/^(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)$/);
  if (range) return (parseFloat(range[1]) + parseFloat(range[2])) / 2;
  const n = parseFloat(str);
  return isNaN(n) ? null : n;
}

// ---- Double-check safety net ----
// Every metric conversion below is computed via TWO independent formulas
// (e.g. lb->g directly, and separately via lb->oz->g) and that agreement
// is re-checked twice before the number is trusted. If the two methods
// don't agree (which would catch a typo'd constant or a logic bug), the
// conversion is silently skipped rather than showing a possibly-wrong
// number — original text is left untouched in that case.
function withinTolerance(a, b, relTol, absTol) {
  return Math.abs(a - b) <= Math.max(absTol, relTol * Math.max(Math.abs(a), Math.abs(b)));
}
function doubleCheckedConversion(methodA, methodB, relTol, absTol) {
  for (let pass = 0; pass < 2; pass++) {
    const a = methodA();
    const b = methodB();
    if (a == null || b == null || isNaN(a) || isNaN(b) || !withinTolerance(a, b, relTol, absTol)) {
      return null;
    }
  }
  return methodA();
}

function convertTemps(text) {
  if (/°C|\bC\)/.test(text)) return text;
  return text.replace(/(\d+)\s*°?\s*F\b/g, (m, f) => {
    const fNum = parseFloat(f);
    // Method A: standard formula. Method B: equivalent but written differently
    // (division by 1.8 instead of *5/9) so a typo in one path won't silently agree.
    const verified = doubleCheckedConversion(
      () => (fNum - 32) * 5 / 9,
      () => (fNum - 32) / 1.8,
      0.001, 0.05
    );
    if (verified == null) return m;
    const c = Math.round(verified / 5) * 5;
    return `${m} (${c}°C)`;
  });
}
function convertPounds(text) {
  const re = new RegExp(METRIC_QTY_RE + "\\s*(lbs?|pounds?)\\b", "gi");
  return text.replace(re, (m, q) => {
    const n = metricQtyToNumber(q);
    if (n == null) return m;
    // Method A: lb->g direct constant. Method B: lb->oz->g via a separate constant.
    const grams = doubleCheckedConversion(
      () => n * 453.592,
      () => n * 16 * 28.3495,
      0.01, 0.5
    );
    if (grams == null) return m;
    const disp = grams >= 1000 ? (Math.round(grams / 10) / 100) + " kg" : Math.round(grams) + " g";
    return `${m} (~${disp})`;
  });
}
function convertOunces(text) {
  const re = new RegExp(METRIC_QTY_RE + "\\s*(oz|ounces?)\\b", "gi");
  return text.replace(re, (m, q) => {
    const n = metricQtyToNumber(q);
    if (n == null) return m;
    // Method A: oz->g direct constant. Method B: oz->lb->g via a separate constant.
    const grams = doubleCheckedConversion(
      () => n * 28.3495,
      () => (n / 16) * 453.592,
      0.01, 0.5
    );
    if (grams == null) return m;
    return `${m} (~${Math.round(grams)} g)`;
  });
}
function convertCups(text) {
  const re = new RegExp(METRIC_QTY_RE + "\\s*cups?\\b", "gi");
  return text.replace(re, (m, q) => {
    const n = metricQtyToNumber(q);
    if (n == null) return m;
    // Method A: kitchen-rounded 240 mL/cup (the friendlier convention we display).
    // Method B: the precise US legal cup (236.588 mL) — generous tolerance since A
    // is an intentional rounding of B, not a competing formula; still catches a
    // gross typo (e.g. an accidental extra digit) instantly.
    const ml = doubleCheckedConversion(
      () => n * 240,
      () => n * 236.588,
      0.02, 1
    );
    if (ml == null) return m;
    return `${m} (~${Math.round(n * 240)} mL)`;
  });
}
function convertQuarts(text) {
  const re = new RegExp(METRIC_QTY_RE + "-?\\s*quarts?\\b", "gi");
  return text.replace(re, (m, q) => {
    const n = metricQtyToNumber(q);
    if (n == null) return m;
    // Method A: quart->L direct constant. Method B: quart->cups->L via a separate constant.
    const liters = doubleCheckedConversion(
      () => n * 0.946353,
      () => n * 4 * 0.236588,
      0.01, 0.02
    );
    if (liters == null) return m;
    return `${m} (~${Math.round(liters * 10) / 10} L)`;
  });
}
function convertInches(text) {
  return text.replace(
    /(\d+(?:\.\d+)?)\s*x\s*(\d+(?:\.\d+)?)([\s-]*in(?:ch(?:es)?)?\.?)|(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)\s*in(?:ch(?:es)?)?\.?|(\d+(?:\.\d+)?)[\s-]*in(?:ch(?:es)?)?\.?/gi,
    (m, xa, xb, xsuffix, ra, rb, single) => {
      // Method A: *2.54 direct. Method B: *25.4/10 (mm-first route) — same exact
      // constant expressed a different way, so a typo in either still gets caught.
      const inToCm = (val) => doubleCheckedConversion(
        () => val * 2.54,
        () => (val * 25.4) / 10,
        0.001, 0.01
      );
      if (xa != null && xb != null) {
        const ca = inToCm(parseFloat(xa)), cb = inToCm(parseFloat(xb));
        if (ca == null || cb == null) return m;
        return `${m} (${Math.round(ca)}x${Math.round(cb)} cm)`;
      }
      if (ra != null && rb != null) {
        const ca = inToCm(parseFloat(ra)), cb = inToCm(parseFloat(rb));
        if (ca == null || cb == null) return m;
        return `${m} (${Math.round(ca)}–${Math.round(cb)} cm)`;
      }
      if (single != null) {
        const cs = inToCm(parseFloat(single));
        if (cs == null) return m;
        return `${m} (${Math.round(cs)} cm)`;
      }
      return m;
    }
  );
}
function metricify(text) {
  if (!text) return text;
  let t = convertTemps(text);
  t = convertPounds(t);
  t = convertOunces(t);
  t = convertCups(t);
  t = convertQuarts(t);
  t = convertInches(t);
  return t;
}

// ------------------------------------------------------------------
// SERVING-SIZE SCALER — multiplies the leading quantity of an
// ingredient line (e.g. "200g flour", "1 1/2 cups sugar", "3/4
// szklanki mąki") by a chosen factor. Only the numeric lead is
// touched; everything else in the line is left exactly as written.
// Quantities that don't start with a recognizable number (ranges,
// words like "garść"/"kilka"/"pół", etc.) are left unscaled.
// ------------------------------------------------------------------
function parseLeadingQty(text) {
  const trimmed = text;
  let m = trimmed.match(/^(\d+)\s+(\d+)\/(\d+)/); // mixed number, e.g. "1 1/2"
  if (m) {
    const whole = parseInt(m[1], 10), num = parseInt(m[2], 10), den = parseInt(m[3], 10);
    if (den) return { value: whole + num / den, raw: m[0] };
  }
  m = trimmed.match(/^(\d+)\/(\d+)/); // simple fraction, e.g. "3/4"
  if (m) {
    const num = parseInt(m[1], 10), den = parseInt(m[2], 10);
    if (den) return { value: num / den, raw: m[0] };
  }
  m = trimmed.match(/^(\d+(?:[.,]\d+)?)/); // integer or decimal (allow "2,5" too)
  if (m) {
    return { value: parseFloat(m[1].replace(",", ".")), raw: m[0] };
  }
  return null;
}
function formatScaledNumber(n) {
  const rounded = Math.round(n * 100) / 100;
  const whole = Math.floor(rounded);
  const frac = Math.round((rounded - whole) * 100) / 100;
  const fracMap = { 0.25: "1/4", 0.5: "1/2", 0.75: "3/4", 0.33: "1/3", 0.67: "2/3" };
  if (frac === 0) return String(whole);
  if (fracMap[frac]) return whole > 0 ? `${whole} ${fracMap[frac]}` : fracMap[frac];
  return String(rounded);
}
function scaleIngredientText(text, factor) {
  if (!text || factor === 1) return text;
  const qty = parseLeadingQty(text);
  if (!qty) return text;
  const scaled = formatScaledNumber(qty.value * factor);
  return scaled + text.slice(qty.raw.length);
}
function renderIngredientsListHtml(ingredients, factor) {
  return ingredients.map(i => `<li>${escapeHtml(metricify(scaleIngredientText(i, factor)))}</li>`).join("");
}

function macrosHtml(r) {
  const ingredients = r.ingredients || [];
  const sourceLine = r.macros ? `${
    ["calories","protein","carbs","fat"].filter(k => r.macros[k]).map(k => `${k} ${escapeHtml(r.macros[k])}`).join(", ")
  }` : "";
  if (ingredients.length === 0) {
    // No ingredients yet (e.g. a meal idea saved before the full recipe was
    // written up) — nothing to auto-calculate, but still show a stated
    // calorie/macro figure if one was given.
    if (!sourceLine) return "";
    return `<div class="modal-section">
      <h4>Macros</h4>
      <div>${sourceLine}</div>
    </div>`;
  }
  const est = calculateRecipeMacros(ingredients);

  // The ingredient-nutrition matcher only recognizes English food/unit words,
  // so a recipe written in Polish, Spanish, etc. will match almost nothing.
  // Rather than show a bogus near-zero estimate as the headline number,
  // fall back to whatever the source page states (if anything), and say
  // plainly when no reliable figure is available at all.
  if (est.coverage < 20) {
    return `<div class="modal-section">
      <h4>Macros (whole batch)</h4>
      ${sourceLine
        ? `<div>Source page states: ${sourceLine}</div><div class="macro-disclaimer">Automatic estimate wasn't reliable for this one (likely because the ingredients are written in a language the estimator doesn't parse) — showing the source's own figures instead.</div>`
        : `<div class="macro-disclaimer">No reliable macro estimate available — the automatic calculator only recognizes English ingredient text, and this recipe's ingredients are in another language. No macros were stated on the original source either.</div>`
      }
    </div>`;
  }

  const rows = `
    <li>Calories: ${est.calories} kcal</li>
    <li>Protein: ${est.protein} g</li>
    <li>Carbs: ${est.carbs} g</li>
    <li>Fat: ${est.fat} g</li>
  `;
  const sourceRef = sourceLine ? `<div class="macro-source-ref">Source page states: ${sourceLine}</div>` : "";
  return `<div class="modal-section">
    <h4>Estimated Macros (whole batch)</h4>
    <ul>${rows}</ul>
    <div class="macro-disclaimer">Auto-calculated from the ingredient list (${est.coverage}% of ingredients matched to a nutrition estimate) — treat as approximate, not lab-verified.</div>
    ${sourceRef}
  </div>`;
}
